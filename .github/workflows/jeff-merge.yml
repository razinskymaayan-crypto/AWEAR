# Phase 2: Jeff the merger. After the managers run, integrate each auto/<manager>
# branch into main — but ONLY if it still builds (npm run check-render). Auto-revert
# a merge that breaks the build; skip (and flag) a branch that conflicts. Fires
# automatically when autopilot-managers finishes; no extra cron minutes.
name: jeff-merge

on:
  workflow_run:
    workflows: ["autopilot-managers"]
    types: [completed]
  push:
    branches:
      - 'auto/**'   # lane branches (engine/managers/strategy) -> Jeff merges them
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: jeff-merge
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install (for check-render + pytest gate + adversarial review)
        run: |
          npm install --no-audit --no-fund || true
          npm install -g @anthropic-ai/claude-code || true
          pip install -q -r requirements.txt pytest || true   # for the backend test gate
      - name: Merge manager branches into main (gated)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          git config user.name "jeff"; git config user.email "jeff@awear.local"
          git fetch origin -q
          git checkout -B main origin/main
          merged=""; reverted=""; conflicted=""; rejected=""
          # engine first — founder directives/INBOX work should land before lane work.
          for m in engine mark steve oren ayalon scout gabbana strategy; do
            git rev-parse --verify "origin/auto/$m" >/dev/null 2>&1 || continue
            ahead=$(git rev-list --count "main..origin/auto/$m" 2>/dev/null || echo 0)
            [ "${ahead:-0}" -eq 0 ] && continue
            if git merge --no-ff -m "jeff: merge auto/$m" "origin/auto/$m"; then
              # GATE 0 — deterministic lane ownership (OW-006: a rule without a mechanism is a
              # recommendation; until now disjoint ownership was enforced only by the persona
              # prompt in GATE 3). Instant + token-free, so it runs FIRST. Blocks only files
              # that unambiguously belong to ANOTHER lane; grey zones fall through to GATE 3.
              # Shared bookkeeping (activity_log, contributions, assignments, INBOX, NEEDS_*,
              # knowledge, notes, IDEAS, ci-debug) is writable by every lane by design.
              SHARED='^(\.claude/agents/(activity_log\.md|contributions/|assignments/|knowledge/)|\.claude/master/INBOX\.md|NEEDS_YOU\.md|NEEDS_DECISION\.md|notes/|docs/IDEAS\.md|ci-debug/)'
              case "$m" in
                mark)   DENY='^(app\.py|schema\.sql|static/data/|scripts/.*\.py$|tests/|docs/|\.github/|mobile/)' ;;
                steve)  DENY='^(static/(index\.html|app\.css|app\.js|tokens\.css)|awear-tokens\.json|docs/|\.github/|mobile/)' ;;
                oren)   DENY='^(static/(index\.html|app\.css|app\.js|tokens\.css)|awear-tokens\.json|app\.py|schema\.sql|docs/|\.github/|mobile/)' ;;
                ayalon|scout|gabbana|strategy) DENY='^(app\.py|schema\.sql|static/|scripts/|awear-tokens\.json|tests/|\.github/|mobile/)' ;;
                *)      DENY='' ;;   # engine: general-purpose, any file — judged on substance in GATE 3
              esac
              if [ -n "$DENY" ]; then
                VIOL=$(git diff --name-only origin/main...HEAD | grep -vE "$SHARED" | grep -E "$DENY" | head -5 || true)
                if [ -n "$VIOL" ]; then
                  git reset --hard origin/main
                  rejected="$rejected $m(ownership)"
                  mkdir -p ci-debug
                  echo "$(date -u +%FT%TZ) $m: REJECT: out-of-lane files: $(echo "$VIOL" | tr '\n' ' ')" >> ci-debug/jeff-rejections.txt
                  continue
                fi
              fi
              # GATE 1 — build: the app must still render.
              if ! npm run check-render; then
                git reset --hard origin/main; reverted="$reverted $m"; continue
              fi
              # GATE 1.5 — backend tests: when app.py / schema.sql / tests / requirements changed,
              # the pytest suite (money paths, validation, idempotency, auth, rate-limit) MUST pass.
              if git diff --name-only origin/main...HEAD -- app.py schema.sql tests/ requirements.txt | grep -q .; then
                # Re-install deps AFTER the merge: a lane may have ADDED a dependency (e.g. bcrypt).
                # The top-level Install step ran on pre-merge requirements.txt, so a new dep would be
                # missing and pytest would fail on import — reverting good work. (Fixes the steve/bcrypt
                # revert loop seen in the gate-ledger 2026-07-07/08.)
                pip install -q -r requirements.txt >/dev/null 2>&1 || true
                if ! python3 -m pytest -q; then
                  git reset --hard origin/main; reverted="$reverted $m(pytest)"; continue
                fi
              fi
              # GATE 2 — locked invariants: SURFACE_SPECS guard (hex/emoji/wording/notch rules).
              if ! bash scripts/guard_checks.sh; then
                git reset --hard origin/main; reverted="$reverted $m(guard)"; continue
              fi
              # GATE 3 — adversarial PERSONA review: agents review agents' work before
              # it can reach main. The reviewer embodies the right critic per file:
              # Gabbana (design critic) for UI files, Steve (CTO) for backend/scripts.
              # Docs-only lanes (scout/gabbana/ayalon/strategy) skip it — nothing executable to break.
              CODE_TOUCHED=$(git diff --name-only origin/main...HEAD -- app.py schema.sql static/index.html static/app.css static/app.js static/tokens.css awear-tokens.json static/data/ scripts/ .github/workflows/ | head -1)
              if [ -n "$CODE_TOUCHED" ] && [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
                git diff origin/main...HEAD -- . ':!package-lock.json' ':!*.png' > /tmp/merge_diff.txt || true
                head -c 80000 /tmp/merge_diff.txt > /tmp/merge_diff_capped.txt
                VERDICT=$(cat /tmp/merge_diff_capped.txt | claude -p "You are AWEAR's ADVERSARIAL merge reviewer. Piped input = a merge diff from lane '$m'. Review each file with the right persona: for static/index.html, static/app.css, static/app.js, static/tokens.css, awear-tokens.json — you are GABBANA, the senior design critic (bar: Instagram/Pinterest/Zara): visual regressions, Iron Rules DS-004 (hardcoded hex without var()), DS-008 (emoji in UI chrome), DS-009 (font-size on image containers), broken layout/z-index. For app.py, schema.sql, static/data/, scripts/, .github/workflows/ — you are STEVE, the CTO: real bugs, broken data references (ids that don't exist), BE-005 (in-memory user data instead of SQLite), BE-006 (user_key pattern), SQL injection, secrets in code, a workflow change that could break the pipeline. Also REJECT for: a change OUTSIDE the lane's file ownership (mark: index.html/app.css/app.js/tokens.css/awear-tokens.json; steve: app.py/schema.sql; oren: static/data+scripts; ayalon/scout/gabbana/strategy: docs only; engine: ANY file — it is the general engine, judge it on substance only), or oscillation (re-changing something activity_log marks done). Style nitpicks are NOT grounds for rejection. Reply with EXACTLY one first line: 'APPROVE' or 'REJECT: <one-line reason>'." \
                  --model claude-fable-5 --output-format text 2>/dev/null | head -5 || echo "APPROVE")
                echo "adversarial verdict for $m: $VERDICT"
                if echo "$VERDICT" | grep -q "^REJECT"; then
                  git reset --hard origin/main
                  rejected="$rejected $m"
                  REASON=$(echo "$VERDICT" | head -1)
                  mkdir -p ci-debug; echo "$(date -u +%FT%TZ) $m: $REASON" >> ci-debug/jeff-rejections.txt
                  continue
                fi
              fi
              merged="$merged $m"
            else
              git merge --abort || true; conflicted="$conflicted $m"
            fi
          done
          if [ -n "$merged" ]; then
            for i in 1 2 3; do git pull --rebase origin main -q && git push origin HEAD:main && break || sleep 3; done
            # reset merged branches so managers start fresh from main next round
            for m in $merged; do git push origin --delete "auto/$m" || true; done
          fi
          MSG="jeff: merged ->${merged:- none}"
          [ -n "$reverted" ] && MSG="$MSG | REVERTED (broke build/guard):$reverted"
          [ -n "$rejected" ] && MSG="$MSG | REJECTED (adversarial review):$rejected — see ci-debug/jeff-rejections.txt"
          [ -n "$conflicted" ] && MSG="$MSG | CONFLICT (needs reconciliation):$conflicted"
          echo "$MSG"
          bash scripts/tg.sh text "$MSG" || true
          # DURABLE GATE LEDGER — closes the #1 learning-loop gap. Every cycle's real outcome
          # (merged / reverted / rejected / conflicted) is persisted where the retrospective looks,
          # INCLUDING reverts — which were previously only a shell var + Telegram string and then
          # shredded by `git reset --hard`. A learner can only correct what survives. One structured
          # line per cycle (~every 6h), committed [skip ci]. This is the single most important
          # self-correction fix from the 2026-07-05 post-mortem.
          mkdir -p ci-debug
          echo "$(date -u +%FT%TZ) | $MSG" >> ci-debug/gate-ledger.md
          [ -n "$conflicted" ] && echo "$(date -u +%FT%TZ) conflict:$conflicted" >> ci-debug/jeff-conflicts.txt
          # CONFLICT TTL — a branch that conflicts 3+ times is chronic: silently re-flagging it
          # every cycle is noise nobody owns (auto/ayalon + auto/scout were flagged 8x over a
          # week with no resolution path). Escalate to Telegram ONCE, then stay quiet.
          for b in $conflicted; do
            CNT=$(grep -c "conflict:.*\b$b\b" ci-debug/jeff-conflicts.txt 2>/dev/null || true)   # no-match: grep prints 0 AND exits 1 — `|| echo 0` would double it
            if [ "${CNT:-0}" -ge 3 ] && ! grep -q "^$b " ci-debug/escalated-conflicts.txt 2>/dev/null; then
              bash scripts/tg.sh text "jeff: auto/$b conflicted ${CNT}x — chronic, needs a founder call: reconcile what's valuable, then delete the branch (git push origin --delete auto/$b). It will keep failing to merge until then. Diff summary: $(git diff --stat main...origin/auto/$b 2>/dev/null | tail -1)" || true
              echo "$b escalated $(date -u +%FT%TZ) after ${CNT}x" >> ci-debug/escalated-conflicts.txt
            fi
          done
          git add ci-debug/ || true
          git commit -m "chore(jeff): gate-ledger [skip ci]" || true
          git pull --rebase origin main -q || true; git push origin HEAD:main || true

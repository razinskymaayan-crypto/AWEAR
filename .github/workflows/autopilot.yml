name: AWEAR Autopilot

# Runs the autonomous AWEAR engineer in GitHub's cloud — no local machine needed.
# Cadence: every 2 hours, 24/7 (no quiet hours — founder opted for max coverage).
# If this ever eats into your own interactive quota in the evening, narrow the
# schedule (e.g. skip 15:00-20:00 UTC) and we're back to quiet hours.

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours, on the hour, 24/7
  workflow_dispatch:        # lets you trigger a run manually from the Actions tab (for testing)

# Never let two runs overlap — they'd fight over git.
concurrency:
  group: awear-autopilot
  cancel-in-progress: false

permissions:
  contents: write       # allow the job to push commits back to the repo

jobs:
  autopilot:
    runs-on: ubuntu-latest
    timeout-minutes: 12   # hard cap per run — a runaway task can't burn your Actions minutes

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history so merges/pushes work

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Playwright (for screenshots)
        continue-on-error: true
        run: npm install playwright && npx playwright install --with-deps chromium

      - name: Configure git identity
        run: |
          git config user.name "Tamar Grosz"
          git config user.email "carmelph16@gmail.com"

      - name: Run autopilot (one task)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          claude -p "$(cat <<'PROMPT'
          You are an autonomous AWEAR engineer working solo. North star: the investor demo in ~2-4 weeks — a <5-min iPhone flow that hits "wow". Every run does meaningful work toward it, never busywork. Do ONE task this run, end to end.

          SAFETY FIRST (before anything else):
          A. Sync — git fetch + merge origin/main. Never overwrite the other team's work.
          B. Health check — run "npm install && npm run check-render". If it FAILS on current HEAD, the previous change broke the app: your ONLY job this run is to fix or "git revert" the breaking commit so the app renders again, then stop. (Auto-rollback.)

          PICK YOUR TASK — strict priority, stop at the first that applies:
          1. INBOX (.claude/master/INBOX.md): EVERY non-empty line under "## משימות חדשות" is a founder task, written in plain Hebrew — interpret intent generously. These ALWAYS come first, over everything. Take the first one.
          2. Highest unfinished task from the MASTER_PLAN week tables (A1, A2, A4a...), earliest week first. Cover all tracks it defines — demo polish, the 5 product layers, AND business/deck docs.
          3. IDLE (1 and 2 exhausted): do MARKET RESEARCH. Each run pick a DIFFERENT topic/domain tied to the app (a competitor app, a UX pattern, onboarding, monetization, retention...). Use web read access. Combine breadth (scan several sources/apps) with depth (study the most relevant one closely). Then implement the small, obviously-good UX improvements DIRECTLY; write bigger findings + concrete proposals to IDEAS.md for founder approval. Save research notes under docs/research/.

          HOW YOU WORK:
          - Scope: one main task + small directly-related fixes you run into. No unrelated edits, no speculative refactors, no renaming for taste. Never re-do anything already in activity_log.
          - VALUE GATE: before coding, state in ONE line the concrete user-facing value. If you cannot, do not build it — propose it in IDEAS.md instead.
          - UI language: English ONLY. The whole app UI is English.
          - New screens: allowed when the roadmap calls for them.
          - Real vs demo: smart hybrid — real backend where it adds value and is cheap; polished demo-fallback elsewhere. The demo must NEVER show broken images or errors.
          - Dependencies: you may add npm/python packages if needed — but log each one and why in TODO_FOR_TAMAR.md.
          - Money logic (orders/credits/payments): treat like normal code.
          - Business docs + pitch deck (docs/PITCH_DECK.md, static/pitch.html): keep improving; you MAY mark them ready. You may PROPOSE changes to locked economics (commission %, resale %, forecasts) in IDEAS.md, but do not change those numbers without founder approval.
          - Self-improvement: you MAY refine this workflow/prompt (.github/workflows/autopilot.yml) if it clearly improves how you work.

          WHEN UNSURE / BLOCKED:
          - A product decision you cannot confidently make → write the question in TODO_FOR_TAMAR.md, pick a different task.
          - A human-only blocker (account, payment, API key) → write it in TODO_FOR_TAMAR.md, pick a different task.
          - Anything that genuinely needs the founder before progress can continue → add one line to NEEDS_YOU.md at the repo root (her prominent alert file).

          VERIFY (must pass before commit):
          - node --check on extracted JS AND npm run check-render both exit 0.
          - Visual changes: pass the gabbana subagent design review at 8+ (fix and re-gate if below).
          - Demo-critical screens: also capture a screenshot and sanity-check it looks right. If screenshot tooling is not set up yet, set it up (or add it as the next TODO).

          REPORT TO THE FOUNDERS' TELEGRAM (after the work is committed — helper: "bash scripts/tg.sh"):
          - Any visual/UI change: screenshot the affected screen, then send it with an explanation. Run: node scripts/shot.mjs <view> /tmp/shot.png  (views: feed, marketplace, outfits, chat, closet, home, profile, wardrobe). Then: bash scripts/tg.sh photo /tmp/shot.png "What changed and why, in 2-3 sentences." If the screenshot fails, send the explanation as text: bash scripts/tg.sh text "...".
          - Market research: save a summary to docs/research/<topic>.md (findings + concrete recommendations as bullet points), then: bash scripts/tg.sh doc docs/research/<topic>.md "Research: <topic> — 2-line takeaway".
          - User-behaviour simulation (you simulate representative users using the app): write a survey summary with bullet-point conclusions, AND generate a chart image via python3+matplotlib to /tmp/survey.png (pip install matplotlib if needed), then: bash scripts/tg.sh photo /tmp/survey.png "Survey: <what was tested>" followed by bash scripts/tg.sh text "<bullet-point conclusions>".
          - Keep every report concise and in English. Always report — a silent run leaves the founders blind.

          FINISH:
          - Append one activity_log.md entry (required format). Reusable lessons → the relevant .claude/agents/knowledge/ file.
          - Update DAILY_DIGEST.md at repo root: once per UTC day reset it; every run appends one line — what you did, what you proposed, what is blocked. ALL your notes/replies/docs to the founder are in ENGLISH.
          - INBOX task done → move its line from "## משימות חדשות" to "## הושלם" with a one-line English note of what you did.
          - Commit (end message with the Co-Authored-By line). Do NOT push — the workflow pushes for you. One task per run, then stop.
          PROMPT
          )" \
            --model opus \
            --permission-mode acceptEdits \
            --allowedTools \
              "Edit" "Write" "Read" "Glob" "Grep" "Task" "WebSearch" "WebFetch" \
              "Bash(git add:*)" "Bash(git commit:*)" "Bash(git status:*)" \
              "Bash(git log:*)" "Bash(git diff:*)" "Bash(git revert:*)" "Bash(git checkout:*)" \
              "Bash(npm install:*)" "Bash(npm run:*)" "Bash(npx playwright:*)" \
              "Bash(node:*)" "Bash(python3:*)" "Bash(awk:*)" \
              "Bash(pip install:*)" "Bash(pip3 install:*)" \
              "Bash(bash scripts/tg.sh:*)" "Bash(node scripts/shot.mjs:*)" \
            --output-format text

      - name: Notify founders on Telegram (only when something needs them)
        if: always()
        continue-on-error: true
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Sends a Telegram message to the "Awear Alerts" group. Only fires when an
          # agent touched NEEDS_YOU.md (something needs you) or INBOX.md (a task is done).
          [ -z "$TG_TOKEN" ] && exit 0
          send() { curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
                     -d chat_id="${TG_CHAT}" -d text="$1" >/dev/null || true; }
          FILES=$(git show --name-only --pretty=format: HEAD 2>/dev/null || true)
          if echo "$FILES" | grep -q "NEEDS_YOU.md"; then
            send "AWEAR — something needs you. An agent flagged something only you can do. Open NEEDS_YOU.md on GitHub."
          fi
          if echo "$FILES" | grep -q "INBOX.md"; then
            send "AWEAR — a task is done. An agent finished a task you gave. Check INBOX.md on GitHub."
          fi

      - name: Push changes
        run: |
          git pull --rebase origin main || true
          git push origin HEAD:main || echo "nothing to push"

      - name: Run status to Telegram (every run — proves the pipe + surfaces failures)
        if: always()
        continue-on-error: true
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -z "$TG_TOKEN" ] && exit 0
          LAST=$(git log -1 --pretty=%s 2>/dev/null || echo "no commit")
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
               --data-urlencode chat_id="$TG_CHAT" \
               --data-urlencode text="AWEAR autopilot — run status: ${{ job.status }}. Latest commit: ${LAST}" \
               >/dev/null || true

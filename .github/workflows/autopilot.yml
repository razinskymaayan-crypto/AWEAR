name: AWEAR Autopilot

# Runs the autonomous AWEAR engineer in GitHub's cloud — no local machine needed.
#
# CADENCE MODEL: a new run starts ~15 MIN AFTER THE PREVIOUS RUN FINISHES — NOT on a fixed
# wall-clock schedule. GitHub cron can only fire on the clock, so the cron below is just a cheap
# HEARTBEAT that wakes the lightweight `gate` job. The gate starts a real run only when BOTH:
#   (a) no other run is currently active, AND
#   (b) >=COOLDOWN_MIN min have passed since the last REAL run finished.
# Repo is PUBLIC => Actions minutes are free/unlimited. The real governor is the Claude token
# budget (subscription session limits), NOT minutes. Founders can pause everything by committing
# a .agents_paused file (Telegram /pause). To slow down, raise COOLDOWN_MIN in the gate.
on:
  schedule:
    - cron: '*/10 * * * *'      # heartbeat every 10 min — repo is PUBLIC, Actions minutes are free/unlimited. Token budget (not minutes) is the real governor now.
  workflow_dispatch:            # manual trigger — bypasses the cooldown (still never overlaps a running job)

permissions:
  contents: write       # allow the job to push commits back to the repo
  actions: read         # allow reading the previous run's logs (self-healing)

jobs:
  # Cheap heartbeat gate (~15s, ~1 Actions-minute). Decides whether a real run should start now.
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - name: Decide — run only if idle AND cooldown passed since the last real run finished
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SELF: ${{ github.run_id }}
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail
          WF="autopilot.yml"
          COOLDOWN_MIN=15         # was 60 (Actions-minutes scarcity). Public repo => near-continuous; token budget is the governor.
          MIN_REAL_DURATION=180   # secs — runs shorter than this are skipped gate-heartbeats, not real work

          # KILL-SWITCH: founders can pause ALL autonomous runs by committing a .agents_paused file
          # (Telegram /pause creates it). Pauses every autonomous lane.
          if curl -sf "https://raw.githubusercontent.com/$REPO/main/.agents_paused" >/dev/null 2>&1; then
            echo ".agents_paused present -> paused"; echo "run=false" >> "$GITHUB_OUTPUT"; exit 0
          fi

          # Manual dispatch always runs (the job-level concurrency below still prevents overlap).
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "manual dispatch -> run"; echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi

          # FAST-HEAL: an [UNRESOLVED] CI failure bypasses the cooldown (still never overlaps a
          # running job). A broken pipeline should heal in minutes, not wait a full cooldown.
          HEAL_NOW=false
          if curl -sf "https://raw.githubusercontent.com/$REPO/main/.claude/agents/knowledge/CI_FAILURES.md" 2>/dev/null | grep -q '\[UNRESOLVED\]'; then
            echo "CI_FAILURES has [UNRESOLVED] -> cooldown bypass armed"
            HEAL_NOW=true
          fi

          RUNS=$(gh api "repos/$REPO/actions/workflows/$WF/runs?per_page=40")

          # 1) Another run already active? Skip — let it finish; it will gate the next one.
          ACTIVE=$(echo "$RUNS" | jq --argjson self "$SELF" '
            [ .workflow_runs[]
              | select(.id != $self)
              | select(.status=="in_progress" or .status=="queued") ] | length')
          if [ "${ACTIVE:-0}" -gt 0 ]; then
            echo "another run active ($ACTIVE) -> skip"; echo "run=false" >> "$GITHUB_OUTPUT"; exit 0
          fi

          # 2) When did the last REAL run finish? (Ignore skipped gate-heartbeats by duration.)
          LAST_END=$(echo "$RUNS" | jq -r --argjson self "$SELF" --argjson mind "$MIN_REAL_DURATION" '
            [ .workflow_runs[]
              | select(.id != $self)
              | select(.status=="completed")
              | select(.run_started_at != null and .updated_at != null)
              | { end: .updated_at,
                  dur: ((.updated_at|fromdateiso8601) - (.run_started_at|fromdateiso8601)) }
              | select(.dur >= $mind) ]
            | sort_by(.end) | last | .end // empty')

          if [ -z "$LAST_END" ]; then
            echo "no previous real run found -> run"; echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi

          if [ "$HEAL_NOW" = "true" ]; then
            echo "idle + unresolved failure -> run now (cooldown bypassed)"
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi

          LAST_TS=$(date -u -d "$LAST_END" +%s)
          NOW_TS=$(date -u +%s)
          ELAPSED_MIN=$(( (NOW_TS - LAST_TS) / 60 ))
          echo "last real run finished ${ELAPSED_MIN}m ago (at $LAST_END); cooldown ${COOLDOWN_MIN}m"
          if [ "$ELAPSED_MIN" -ge "$COOLDOWN_MIN" ]; then
            echo ">= cooldown -> run"; echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "< cooldown -> skip"; echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  autopilot:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    # Safety belt: never let two real runs overlap and fight over git. The gate is the primary
    # guard (it skips when a run is active), so this should essentially never have to queue/cancel.
    concurrency:
      group: awear-autopilot-run
      cancel-in-progress: false
    timeout-minutes: 30   # hard cap per run. Was 12, which killed real tasks mid-run (claude-code +
                          # playwright-with-deps install + an opus task with subagents/web/charts + verify
                          # routinely exceed 12m → GitHub cancels the job and the work is lost). 30m lets a
                          # run finish while still bounding Actions-minute spend. Raise further if runs still cancel.

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history so merges/pushes work

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Playwright (for screenshots)
        continue-on-error: true
        run: npm install playwright && npx playwright install --with-deps chromium

      - name: Configure git identity
        run: |
          git config user.name "Tamar Grosz"
          git config user.email "carmelph16@gmail.com"

      # REVIEW-BEFORE-MERGE: the engine no longer pushes to main. It works on
      # auto/engine, and Jeff's merge gate (jeff-merge.yml: build + guard +
      # adversarial persona review) is the ONLY path into main — same contract
      # as every manager lane. Nothing unreviewed lands on main.
      - name: Prepare engine branch (auto/engine, synced with main)
        run: |
          git fetch origin
          git checkout -B auto/engine origin/auto/engine 2>/dev/null || git checkout -B auto/engine origin/main
          # Carry over unmerged work from a previous run; on conflict start fresh
          # from main (Jeff already logged the old branch as conflicted).
          git merge origin/main --no-edit || { git merge --abort || true; git checkout -B auto/engine origin/main; }

      - name: Detect previous-run failure (self-healing)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/detect_ci_failure.sh

      - name: Run autopilot (one task)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          claude -p "$(cat <<'PROMPT'
          You are an autonomous AWEAR engineer working solo. North star: the investor demo in ~2-4 weeks — a <5-min iPhone flow that hits "wow". Every run does meaningful work toward it, never busywork. Do ONE task this run, end to end.

          SAFETY FIRST (before anything else):
          A0. SELF-HEAL — read .claude/agents/knowledge/CI_FAILURES.md. If it has an [UNRESOLVED] entry (the previous CI run failed), fixing it is your TOP priority this run, before INBOX: diagnose the root cause from the log tail, FIX it (in the app code OR directly in the failing .github/workflows/*.yml — e.g. a flaky install, a bad command, a timeout), verify, then change [UNRESOLVED] → [FIXED] with a one-line note, and send Telegram: bash scripts/tg.sh text "Auto-fix: <what failed> -> <the fix>". A broken pipeline blocks everything, so heal it first.
          A. Sync — you are already on branch auto/engine, merged with latest main (the workflow prepared it). Never overwrite the other team's work. Your commits land on this branch; Jeff's merge gate reviews and merges them to main — you never push to main yourself.
          A1. REJECTION FEEDBACK — read ci-debug/jeff-rejections.txt. If its LAST "engine:" line is newer than this branch's last merge to main, Jeff's reviewer REJECTED your previous work for that reason — fixing that rejection IS your task this run, before anything else below.
          B. Health check — run "npm install && npm run check-render". If it FAILS on current HEAD, the previous change broke the app: your ONLY job this run is to fix or "git revert" the breaking commit so the app renders again, then stop. (Auto-rollback.) ALSO append one row to .claude/agents/knowledge/FAILURES.md (| date | what broke | root cause | rule it violated or "new" |) so the daily retrospective can learn from it.

          PICK YOUR TASK — strict priority, stop at the first that applies:
          1. ANSWERED FOUNDER DIRECTIVES (.claude/master/FOUNDER_QUESTIONS.md, "## ANSWERED"): each is a direction the founders chose this/yesterday. Execute the first unfinished one, then mark it [done] and move its block to "## ARCHIVE". These top everything except a broken build.
          2. INBOX (.claude/master/INBOX.md): EVERY non-empty line under "## משימות חדשות" is a founder task, written in plain Hebrew — interpret intent generously. Take the first one.
          3. ADVANCE THE LOOP (the north star — see MASTER_PLAN "החזון התפעולי / The Loop"): the single most valuable thing you can do is move a loop stage from SEEDED to REAL — SCAN (photo→parse) · MATCH (% to closet) · LOOKS (AI outfits) · BUY (in-app order) · EARN (creator credit). Pick the highest-leverage seeded→real advance for the earliest still-seeded stage. State which stage in your VALUE GATE.
          4. Highest unfinished task from the MASTER_PLAN week tables (A1, A2, A4a...), earliest week first.
          5. IDLE / LOW PRIORITY — polish, research, survey (3,4 exhausted). Polish is the LOWEST tier and is HARD-CAPPED at one polish task per run. NEVER re-touch an area+topic that activity_log already records as done, and NEVER re-open a decision locked in docs/SURFACE_SPECS.md (OW-011 — that is how oscillation/reverts happen). MVPs working correctly always outrank polish. Then: FIRST check team utilization — read the last 24h of .claude/agents/contributions/ . If any ACTIVE-domain agent (dolce, valentino, gabbana, netta, sam, oren, shira — NOT the dormant mobile agents) has zero contributions in that window, proactively give the longest-idle one a concrete domain-improvement task THIS run (route through its manager; apply the VALUE GATE — small obvious win committed directly, bigger idea to IDEAS.md). Otherwise, ALTERNATE EVENLY between MARKET RESEARCH and a USER SURVEY: decide by recency — compare the newest dated file in docs/research/ vs docs/surveys/ (ignore README.md) and do whichever was done less recently; if neither has a dated file yet, do a USER SURVEY.
             3a. MARKET RESEARCH: pick a DIFFERENT topic/domain each time (a competitor app, a UX pattern, onboarding, monetization, retention...). Use web read access. Combine breadth (scan several sources/apps) with depth (study the most relevant closely). Implement small obviously-good UX wins DIRECTLY; write bigger findings + concrete proposals to IDEAS.md. Save notes to docs/research/YYYY-MM-DD-<topic>.md.
             3b. USER SURVEY: pick a rotating target — a whole screen (feed/marketplace/closet/outfits/profile...) OR a single feature. Capture a real screenshot: node scripts/shot.mjs <view> /tmp/shot.png AND read the relevant code. Then SYNTHESIZE the aggregate feedback of ~100 EXPERT reviewers (do not run 100 separate passes — synthesize in aggregate within the time budget). Steer the experts with the domain subagents via the Task tool: gabbana for the design/visual panel, ayalon for the product panel, and other relevant agents (valentino commerce, shira social...) for theirs. Pick metrics that fit the target (satisfaction 1-10, confusion/drop-off points, purchase intent, competitor benchmark). Produce: (i) a dated doc docs/surveys/YYYY-MM-DD-<target>.md (target, panel, metrics, chart refs, bullet conclusions, "Fixed now" vs "Proposed to IDEAS"); (ii) 2-4 chart PNGs via: python3 scripts/chart.py /tmp/survey1.png '{"title":"...","type":"bar|grouped|line","labels":[...],"series":[{"name":"...","values":[...]}],"ylabel":"1-10"}' (pip install matplotlib first if needed); (iii) bullet conclusions. Then FIX small/obvious issues DIRECTLY (one scoped change, verified) and append bigger recommendations to IDEAS.md. Each survey is STANDALONE — do not compare to previous surveys.
             3c. SEVERE FINDING: if any surveyed screen/feature scores an average < 4/10, ALSO (a) send a special Telegram alert: bash scripts/tg.sh text "SEVERE (<4/10): <target> — <why>"; (b) add a line to NEEDS_YOU.md; (c) fix it this run if it is small/safe, else propose it to IDEAS.md.

          TEAM — STRICT DELEGATION (you are a TEAM LEAD, not a solo engineer):
          For ANY domain work you must route through the right MANAGER, who assigns the IC. You yourself only coordinate, glue pieces together, run checks, and commit — you do NOT do the domain craft directly. Use the Task tool to consult the manager and then the IC. No cap on how many agents a single run uses; a run may move across several. Map:
            • Social/Wardrobe UI (Feed, Home, Profile, Closet, Onboarding) → manager mark → IC dolce
            • Commerce/Intelligence UI (Shop, Marketplace, Analytics, AI Stylist, Explore) → manager mark → IC valentino
            • Design QA / visual gate → manager mark → IC gabbana
            • Design system / tokens → manager mark → IC netta
            • Backend / API / DB → manager steve → IC sam
            • Cross-layer integration / security → manager steve → IC oren
            • Social features (comments, moderation, reactions) → manager ayalon → IC shira
            • Product decisions / scope → ayalon
            • Mobile (RN) → dana/roei/varan are DORMANT — do NOT use them (RN is deferred per MASTER_PLAN).
          Aligns with MG-002 (never skip the manager). Record real IC attribution (see FINISH).

          HOW YOU WORK:
          - EFFORT TIER: classify the task S/M/L per .claude/rules/effort.md BEFORE working and behave accordingly (S = execute directly; M = 5-line plan; L = full plan + subagent research + fresh-context review). Escalating a tier needs a one-line justification.
          - APPLY LEARNING: before domain work, the assigned IC reads OW.md + its domain knowledge file (.claude/agents/knowledge/) and APPLIES those rules. Learning is only real if applied — do not repeat a documented mistake.
          - Scope: one main task + small directly-related fixes you run into. No unrelated edits, no speculative refactors, no renaming for taste. Never re-do anything already in activity_log.
          - VALUE GATE: before coding, state in ONE line (i) the concrete user-facing value AND (ii) which loop-stage it advances (SCAN/MATCH/LOOKS/BUY/EARN) or that it is "polish"/"infra"/"answered-directive". If you cannot, do not build it — propose it in IDEAS.md instead. "Done" = that value delivered, not merely "renders without error" (OW-002).
          - NO OSCILLATION (OW-011): before touching a screen, check activity_log + docs/SURFACE_SPECS.md. Do NOT re-change an area+topic already marked done, and do NOT re-open a locked decision (e.g. the Buy CTA must stay prominent), unless an ANSWERED founder directive or a metric justifies it. Re-litigating finished surfaces is the #1 source of wasted/ reverted work.
          - UI language: English ONLY. The whole app UI is English.
          - New screens: allowed when the roadmap calls for them.
          - Real vs demo: smart hybrid — real backend where it adds value and is cheap; polished demo-fallback elsewhere. The demo must NEVER show broken images or errors.
          - Dependencies: you may add npm/python packages if needed — but log each one and why in TODO_FOR_TAMAR.md.
          - Money logic (orders/credits/payments): treat like normal code.
          - Business docs + pitch deck (docs/PITCH_DECK.md, static/pitch.html): keep improving; you MAY mark them ready. You may PROPOSE changes to locked economics (commission %, resale %, forecasts) in IDEAS.md, but do not change those numbers without founder approval.
          - Self-improvement: you MAY refine this workflow/prompt (.github/workflows/autopilot.yml) if it clearly improves how you work.

          WHEN UNSURE / BLOCKED:
          - A product/DIRECTION fork → first try to resolve it in order: MASTER_PLAN → docs/SURFACE_SPECS.md → .claude/master/GUIDANCE.md. If still unresolved → ASK, do NOT guess (guessing is how work gets built then reverted). Append a question to .claude/master/FOUNDER_QUESTIONS.md "## OPEN" (question + 2-3 options + your recommendation + loop-stage + category), then pick a DIFFERENT task. ERR TOWARD ASKING. The founders answer once a day (in a session with the assistant, or via Telegram); their answer becomes a top-priority directive next run, and a reusable answer is promoted into GUIDANCE.md so the class is never asked again (OW-012).
          - A purely operational blocker (account, payment, API key, a small ambiguity you can resolve sensibly) → write it in TODO_FOR_TAMAR.md, pick a different task.
          - A human-only blocker (account, payment, API key) → write it in TODO_FOR_TAMAR.md, pick a different task.
          - Anything that genuinely needs the founder before progress can continue → add one line to NEEDS_YOU.md at the repo root (her prominent alert file).

          VERIFY (must pass before commit):
          - node --check on extracted JS AND npm run check-render both exit 0.
          - bash scripts/guard_checks.sh exits 0 — BLOCKING. It enforces the locked invariants in docs/SURFACE_SPECS.md (notch safe-area, no "Google Shopping" wording, no new hardcoded hex/emoji, no known repeat-mistakes). If you intentionally changed a locked decision because of an ANSWERED founder directive, update docs/SURFACE_SPECS.md FIRST, then the gate.
          - UI changes: also run "python3 scripts/check_notch.py" (real iPhone-15-Pro profile, needs the local server up) — it must exit 0 (Iron Rule #13). Do NOT re-touch a screen/topic already "done" in activity_log or a locked SURFACE_SPECS decision (OW-011).
          - Visual changes: pass the gabbana subagent design review at 8+ (fix and re-gate if below).
          - Demo-critical screens: also capture a screenshot and sanity-check it looks right. If screenshot tooling is not set up yet, set it up (or add it as the next TODO).
          - After a BIG visual change to a demo-critical screen (passed gabbana 8+): run a quick USER SURVEY of that screen (per step 3b) to confirm the change actually improved it, and include the survey in your Telegram report.

          REPORT TO THE FOUNDERS' TELEGRAM (after the work is committed — helper: "bash scripts/tg.sh"):
          - Any visual/UI change: screenshot the affected screen, then send it with an explanation. Run: node scripts/shot.mjs <view> /tmp/shot.png  (views: feed, marketplace, outfits, chat, closet, home, profile, wardrobe). Then: bash scripts/tg.sh photo /tmp/shot.png "What changed and why, in 2-3 sentences." If the screenshot fails, send the explanation as text: bash scripts/tg.sh text "...".
          - Market research: save a summary to docs/research/<topic>.md (findings + concrete recommendations as bullet points), then: bash scripts/tg.sh doc docs/research/<topic>.md "Research: <topic> — 2-line takeaway".
          - User survey: send EACH chart as a photo — bash scripts/tg.sh photo /tmp/survey1.png "Survey: <target> — <metric>" (repeat for each chart); then the bullet conclusions as text — bash scripts/tg.sh text "<bullet-point conclusions>"; then the full doc — bash scripts/tg.sh doc docs/surveys/<file>.md "Full survey: <target>". If charting fails, still send the bullets + doc as text.
          - Keep every report concise and in English. Always report — a silent run leaves the founders blind.

          FINISH:
          - Update STATE.md (root) per .claude/rules/memory.md — a fresh session must be able to resume from it alone.
          - End your run summary with the exact report block from .claude/rules/reporting.md (TASK/TIER/CHANGED/WHY/VERIFIED/CONFIDENCE/NEEDS HUMAN). If jeff-merge later rejects this work, converting the rejection into a knowledge entry (domain file + INDEX row) is a top-priority item for your NEXT run.
          - Append one activity_log.md entry (required format). The "agent" column must name the ACTUAL IC who did the work (dolce/valentino/sam/oren/gabbana/netta/shira/ayalon), NOT "orchestrator". Reusable lessons → the relevant .claude/agents/knowledge/ file.
          - TEAM LEDGER: for EVERY agent you delegated to this run, append one row to .claude/agents/contributions/<UTC-date>.md (create the file with a "| time | agent | manager | ~tokens | task |" header row if it does not exist) in the format: | HH:MM | <agent> | <manager> | ~<tokens> | <one-line of what they did> | . <tokens> is your rough order-of-magnitude estimate (e.g. ~120k). This feeds the daily team report.
          - Update DAILY_DIGEST.md at repo root: once per UTC day reset it; every run appends one line — what you did, what you proposed, what is blocked. ALL your notes/replies/docs to the founder are in ENGLISH.
          - INBOX task done → move its line from "## משימות חדשות" to "## הושלם" with a one-line English note of what you did.
          - Commit (end message with the Co-Authored-By line). Do NOT push — the workflow pushes for you. One task per run, then stop.
          PROMPT
          )" \
            --model claude-fable-5 \
            --permission-mode acceptEdits \
            --allowedTools \
              "Edit" "Write" "Read" "Glob" "Grep" "Task" "WebSearch" "WebFetch" \
              "Bash(git add:*)" "Bash(git commit:*)" "Bash(git status:*)" \
              "Bash(git log:*)" "Bash(git diff:*)" "Bash(git revert:*)" "Bash(git checkout:*)" \
              "Bash(npm install:*)" "Bash(npm run:*)" "Bash(npx playwright:*)" \
              "Bash(node:*)" "Bash(python3:*)" "Bash(awk:*)" \
              "Bash(pip install:*)" "Bash(pip3 install:*)" \
              "Bash(bash scripts/tg.sh:*)" "Bash(node scripts/shot.mjs:*)" "Bash(python3 scripts/chart.py:*)" \
            --output-format text

      - name: Notify founders on Telegram (only when something needs them)
        if: always()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Sends a Telegram message to the "Awear Alerts" group. Only fires when an
          # agent touched NEEDS_YOU.md (something needs you) or INBOX.md (a task is done).
          # Delivery goes through scripts/tg.sh -> tglib.py (retries, audit log).
          FILES=$(git show --name-only --pretty=format: HEAD 2>/dev/null || true)
          if echo "$FILES" | grep -q "NEEDS_YOU.md"; then
            bash scripts/tg.sh text "AWEAR — something needs you. An agent flagged something only you can do. Open NEEDS_YOU.md on GitHub." || true
          fi
          if echo "$FILES" | grep -q "INBOX.md"; then
            bash scripts/tg.sh text "AWEAR — a task is done. An agent finished a task you gave. Check INBOX.md on GitHub." || true
          fi

      # INDEPENDENT VERIFY GATE (OW-006: a rule without an enforcement mechanism is only a
      # recommendation). The agent is INSTRUCTED to run check-render + guard_checks, but this
      # step enforces it at the workflow level — a run that crashed mid-task, ignored the
      # instruction, or committed broken code can NOT reach main. If this fails, the job fails
      # and the push below is skipped; detect_ci_failure.sh records it for the next run to heal.
      - name: Verify gate — build + locked invariants (BLOCKING, workflow-enforced)
        run: |
          set -euo pipefail
          # Only gate if the run actually committed something on top of origin/main.
          if git diff --quiet origin/main...HEAD 2>/dev/null; then
            echo "no new commits this run — nothing to gate"; exit 0
          fi
          npm install --no-audit --no-fund
          npm run check-render
          bash scripts/guard_checks.sh

      - name: Push engine branch (never main — jeff-merge is the only path to main)
        if: success()
        run: |
          for i in 1 2 3; do
            git push origin HEAD:auto/engine && break
            git pull --rebase origin auto/engine || true
            sleep 3
          done

      - name: Run status to Telegram (every run — proves the pipe + surfaces failures)
        if: always()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          LAST=$(git log -1 --pretty=%s 2>/dev/null || echo "no commit")
          bash scripts/tg.sh text "AWEAR autopilot — run status: ${{ job.status }}. Latest commit: ${LAST}" || true

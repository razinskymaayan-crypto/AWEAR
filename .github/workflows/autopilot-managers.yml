# Phase 1 of the parallel-agent org: one autonomous run PER LANE, in parallel,
# each on its own branch (auto/<lane>). Lane owners delegate to their ICs and commit
# to their branch only — Jeff (Phase 2) merges branches to main with gates.
# Repo is public => Actions minutes are free/unlimited, so this runs on a schedule.
# ANTI-COLLISION: each lane OWNS a disjoint set of files (the "OWNS files" line below).
# Two lanes never touch the same file => Jeff merges cleanly. Violating your lane's
# file ownership is how merge wrecks happen — it is an Iron-Rule-level offense.
name: autopilot-managers

on:
  workflow_dispatch:
    inputs:
      manager:
        description: 'Run a single lane (mark|steve|ayalon) or "all"'
        default: 'all'
  schedule:
    - cron: '0 */2 * * *'    # every 2h (founder 2026-07-19: harden-the-engine sprint, high iteration) -> 12 cycles/day x 3 lanes.
                             # Cadence IS the budget cap: paces the founder's Max quota evenly across the month.
                             # (Was */30 with 6 lanes = ~288 runs/day -> burned a Max weekly in ~a day.)
  push:
    paths:
      - '.agents_trigger'   # self-serve trigger: commit this file to fire a run

concurrency:
  group: autopilot-managers
  cancel-in-progress: false

jobs:
  # CIRCUIT BREAKER — the old autopilot failed 7x in a row burning tokens until a human
  # noticed and disabled it manually. This job costs ~15s and zero tokens: 3 consecutive
  # failed cycles -> create .agents_paused (the existing kill-switch) + Telegram alert,
  # so a broken loop stops itself instead of burning the founder's quota until discovered.
  # Manual workflow_dispatch bypasses it (human intent), same spirit as the kill-switch docs.
  breaker:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: write
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Trip breaker after 3 consecutive failed cycles
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -uo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"; echo "manual dispatch — breaker bypassed"; exit 0
          fi
          LAST3=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/actions/workflows/autopilot-managers.yml/runs?status=completed&per_page=10" \
            | python3 -c 'import json,sys; rs=json.load(sys.stdin).get("workflow_runs",[]); print(" ".join((r.get("conclusion") or "?") for r in rs[:3]))')
          echo "last 3 completed cycles: ${LAST3:-none}"
          if [ "$LAST3" = "failure failure failure" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            # Latch via the existing kill-switch so every later cycle skips at the gate step
            # (and loop-liveness knows silence is intentional). Founder resumes by deleting
            # .agents_paused (or Telegram /resume).
            BODY=$(printf 'auto-paused by circuit breaker: 3 consecutive failed autopilot-managers cycles (%s UTC).\nDelete this file (or Telegram /resume) to re-enable the lanes.\n' "$(date -u +%FT%TZ)" | base64 -w0)
            curl -s -X PUT -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/contents/.agents_paused" \
              -d "{\"message\":\"chore(breaker): auto-pause after 3 consecutive failed cycles [skip ci]\",\"content\":\"$BODY\"}" >/dev/null || true
            [ -n "$TG_TOKEN" ] && curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              --data-urlencode chat_id="$TG_CHAT" \
              --data-urlencode text="AWEAR breaker: autopilot-managers failed 3 cycles in a row — lanes AUTO-PAUSED (.agents_paused created) to stop the token burn. Check the Actions logs, fix, then delete .agents_paused to resume." \
              >/dev/null || true
            echo "breaker TRIPPED — lanes paused"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  manager:
    needs: breaker
    if: needs.breaker.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 3
      # THREE lanes, STRICTLY DISJOINT file ownership => two lanes can never touch the same
      # file => Jeff always merges cleanly => the merge-conflict failures (78% of the old 6-lane
      # runs) are gone by construction. gabbana is a design GATE invoked inside the design lane
      # (Task tool in VERIFY), not a parallel lane; oren's data work folds into steve's backend
      # lane; scout's research is deferred (token-heavy, zero demo value) until the demo is solid.
      matrix:
        include:
          - manager: mark
            lane: "Design/UI lane — the demo's look & feel is your job. ICs: dolce (feed/home/profile/closet/onboarding), valentino (shop/marketplace/analytics/stylist/explore), netta (tokens); gabbana = mandatory design gate (must score 8+). OWNS files (edit ONLY these): static/index.html, static/app.css, static/app.js, static/tokens.css, awear-tokens.json. Knowledge: OW.md + ds.md. NOTE: the SPA is now split — HTML shell in index.html, all CSS in app.css, all JS in app.js."
          - manager: steve
            lane: "Backend + data lane. ICs: sam (app.py endpoints/models/DB), oren (data integrity in static/data/*.json). OWNS files (edit ONLY these): app.py, schema.sql, static/data/*.json, scripts/*.py. Knowledge: OW.md + be.md. Do NOT touch static/index.html (mark's lane) or docs/* (ayalon's lane)."
          - manager: ayalon
            lane: "Product + business + investor lane. IC: shira (social features spec). OWNS files (edit ONLY these): docs/* (PITCH_DECK, BUSINESS_PLAN, MASTER_PLAN, surveys, research, IDEAS.md). Mission: business plan, pitch deck, strategy, unit economics, investor narrative. Knowledge: OW.md + mg.md + sf.md. Do NOT touch app.py / static/* (code lanes)."
    steps:
      - name: Skip if a single manager was requested and it's not this one (or agents are paused)
        id: gate
        run: |
          # KILL-SWITCH: .agents_paused on main pauses all lanes (Telegram /pause creates it).
          if curl -sf "https://raw.githubusercontent.com/${{ github.repository }}/main/.agents_paused" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"; echo "agents paused -> skipping ${{ matrix.manager }}"; exit 0
          fi
          REQ="${{ github.event.inputs.manager }}"
          if [ -n "$REQ" ] && [ "$REQ" != "all" ]; then
            # explicit single-lane manual dispatch -> run only that lane
            if [ "$REQ" = "${{ matrix.manager }}" ]; then echo "skip=false" >> "$GITHUB_OUTPUT";
            else echo "skip=true" >> "$GITHUB_OUTPUT"; echo "skipping ${{ matrix.manager }}"; fi
          else
            # scheduled OR manual "all": ROTATE one lane per 6h cycle. Running 3 Claude sessions
            # in parallel blew the account's 5-hour session limit (that was the failure emails).
            # Slot by the UTC 6-hour block so mark/steve/ayalon take turns across the day.
            H=$((10#$(date -u +%H)))
            LANES=(mark steve ayalon)
            TURN=${LANES[$(( (H / 6) % 3 ))]}
            if [ "${{ matrix.manager }}" = "$TURN" ]; then
              echo "skip=false" >> "$GITHUB_OUTPUT"; echo "this cycle's lane -> ${{ matrix.manager }}"
            else
              echo "skip=true" >> "$GITHUB_OUTPUT"; echo "not this cycle's turn (turn=$TURN) -> skip ${{ matrix.manager }}"
            fi
          fi

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Prepare manager branch (auto/<manager>, synced with main)
        if: steps.gate.outputs.skip != 'true'
        run: |
          git config user.name "awear-${{ matrix.manager }}"
          git config user.email "${{ matrix.manager }}@awear.local"
          git fetch origin
          git checkout -B "auto/${{ matrix.manager }}" "origin/auto/${{ matrix.manager }}" 2>/dev/null \
            || git checkout -B "auto/${{ matrix.manager }}" origin/main
          git merge origin/main --no-edit || { echo "merge conflict vs main — Jeff will reconcile"; git merge --abort || true; }

      - name: Setup
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install claude-code
        if: steps.gate.outputs.skip != 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Run manager
        if: steps.gate.outputs.skip != 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set +e   # we handle Claude's exit code ourselves (graceful skip on account/session limit)
          claude -p "$(cat <<'PROMPT'
          You are the LANE-OWNER agent "${{ matrix.manager }}" at AWEAR, running autonomously and IN PARALLEL with the other lanes. North star: a polished investor demo of the WOW flow (docs/PRODUCT_VISION.md). You do ONE end-to-end task this run, then stop.

          YOUR LANE (stay strictly inside it — other lanes own other files; touching their files causes merge wrecks):
          ${{ matrix.lane }}

          SAFETY FIRST:
          - You are already on branch auto/${{ matrix.manager }}, merged with latest main. Read .claude/agents/knowledge/OW.md + your domain knowledge file(s) and APPLY the rules.
          - REJECTION FEEDBACK (DO THIS FIRST — this is how you stop repeating mistakes): run `grep " ${{ matrix.manager }}:" ci-debug/jeff-rejections.txt | tail -1`. If that line exists AND its timestamp is within the last 48h, the merge gate REJECTED your previous work for EXACTLY that reason (branch churn means you start fresh with no memory of it — so you MUST read it here). Fixing precisely that rejection — editing ONLY files your lane OWNS — is your ONLY task this run, before the priority list below. Read the reason literally and do NOT repeat it (e.g. a DS-004 fallback rejection = fix the fallback IN static/app.css / index.html to the token's REAL value like var(--accent,#e8526a), never a dark relic like #14110F). IMPORTANT: do NOT try to add a regression guard that lives in ANOTHER lane's files (scripts/guard_checks.sh is steve's, not mark's) — that just earns a fresh ownership rejection; if such a guard is warranted, add a one-line request to that lane's assignment file (.claude/agents/assignments/<lane>.md) and move on. The actual code fix in YOUR lane is what must land.
          - Health check: run "npm install && npm run check-render". If it FAILS on the current branch, your ONLY job is to fix or revert what broke it, then stop.

          PICK YOUR TASK — strict priority, stop at the first that applies:
          0. SELF-HEAL (top priority): read .claude/agents/knowledge/CI_FAILURES.md. If it has an [UNRESOLVED] entry naming YOUR lane's OWN code (e.g. "${{ matrix.manager }}(pytest)" from a file your lane owns) — root-cause + fix it in your lane (reproduce, fix, add a regression test per OW-014), that is your ONLY task this run; then change [UNRESOLVED] -> [FIXED] with a one-line note. **BUT if the [UNRESOLVED] points at a GATE/WORKFLOW (`.github/`) — you physically CANNOT land that fix: GATE 0 denies `.github/` for lanes, and a running workflow always uses main's copy. Only the founder / main session fixes the engine. Do NOT edit `.github/`, do NOT re-verify it, do NOT burn this run on it.** If that gate issue isn't already in NEEDS_YOU.md, add ONE escalation line there, then skip straight to your real queue below.
          1. MEASURED PRODUCT DEFECTS (this is the real work — before any wishlist): run `python3 scripts/defect_scan.py` (needs the server; the workflow already started it — else `venv312/bin/uvicorn app:app --port 8000 &` first). It writes ci-debug/DEFECTS.md — a queue RANKED by severity×centrality, each line tagged **[lane]**. Pick the HIGHEST-scored OPEN defect tagged **[${{ matrix.manager }}]** and fix THAT. A `crash` (5xx) or `stuck_overlay` outranks everything in the INBOX — a live-broken product beats a nice-to-have. After fixing, re-run defect_scan.py and confirm your defect is gone (that IS your regression proof, OW-014). If the scanner itself is wrong (false positive/negative, like it once flagged a working sheet), FIX THE SCANNER — a lying detector is worse than none (OW-015). If DEFECTS.md has no open item for your lane, go on:
          2. YOUR DIRECT QUEUE: .claude/agents/assignments/${{ matrix.manager }}.md — founder tasks routed to you from Telegram (@${{ matrix.manager }} ...) AND any IC you manage (.claude/agents/assignments/<ic>.md). Do the first unchecked one; check it off when done.
          3. INBOX (.claude/master/INBOX.md "## משימות חדשות") — founder DIRECTION (vision/priorities), not the bug list. Items that fall in YOUR lane. Interpret the Hebrew generously.
          4. Highest unfinished MASTER_PLAN / PRODUCT_VISION item in your lane.
          5. ADVANCE THE DEMO (nothing above): ship the single highest-leverage improvement to the WOW flow in YOUR lane — a real feature, a fixed bug, or a visibly better screen. Prefer shipping working UI/backend over writing documents. Market research and user surveys are DEFERRED until the demo is investor-ready (they burn tokens with zero demo value) — the ONLY exception is the ayalon lane, whose job IS the business plan / pitch / strategy docs. State the concrete user-facing value in ONE line before you build; if you cannot, you have no task — stop this run rather than invent busywork.

          STRICT DELEGATION: route domain craft to your ICs via the Task tool (you coordinate + glue + verify + commit; you do not do IC craft yourself). Map for your lane is in OW.md / the autopilot prompt. Record real IC attribution.

          RULES:
          - EFFORT TIER: classify the task S/M/L per .claude/rules/effort.md BEFORE working and behave accordingly; tier escalation needs a one-line justification.
          - VALUE GATE: before coding, state in ONE line the concrete user-facing value. If you can't, propose it to IDEAS.md instead.
          - Scope: ONLY files your lane OWNS. No edits outside your lane. UI language English only.
          - A blocker only the founder can resolve -> add a line to NEEDS_YOU.md and pick a different task.

          PRE-COMMIT SELF-REVIEW — you MUST pass the merge gate on the FIRST try (a rejection = a wasted cycle; nothing lands). Before committing, run the SAME checks jeff's gate will run and fix any hit:
          1. IN-LANE ONLY: `git diff --name-only` — every path is a file YOUR lane owns (see YOUR LANE above). A single out-of-lane file = instant rejection. If your fix needs another lane's file, request it in their assignment file instead.
          2. RENAME SAFETY (OW-001): if you renamed ANY id/class/field/function, grep the OLD name across app.py + static/index.html + static/app.js + mobile/ and update EVERY caller — or don't rename. A rename that shows only the definition change is auto-rejected.
          3. DS-004: every `var(--token, FALLBACK)` fallback must be the token's REAL value (grep your diff for dark relics like `#14110F`/`#3D3833` used as --accent/--accent2 fallbacks — those should be `#e8526a`/`#c4855a`). No bare hex outside var().
          4. DS-008 (no emoji in UI chrome — use icon()/SVG) · DS-009 (no font-size on image containers).
          5. `node --check` on extracted JS AND `npm run check-render` both exit 0. For a visual change, pass the gabbana subagent at 8+ and screenshot (node scripts/shot.mjs <view> /tmp/shot.png).
          Only commit once ALL of the above pass. If you cannot make them pass, revert and stop — do not commit work that will be rejected.

          REPORT (after commit, helper bash scripts/tg.sh) — SIGN AS YOURSELF: prefix every message with "${{ matrix.manager }}: ". For a UI change send the screenshot: bash scripts/tg.sh photo /tmp/shot.png "${{ matrix.manager }}: <what changed, 2 sentences>". Else: bash scripts/tg.sh text "${{ matrix.manager }}: <one-line update>".

          FINISH:
          - End your run summary with the exact report block from .claude/rules/reporting.md (TASK/TIER/CHANGED/WHY/VERIFIED/CONFIDENCE/NEEDS HUMAN). A jeff-merge rejection of this work must become a knowledge entry (domain file + INDEX row) at the start of your NEXT run.
          - Append an activity_log.md row (agent = the actual IC who did the craft).
          - TEAM LEDGER: .claude/agents/contributions/<UTC-date>.md — one row per agent you used: | HH:MM | <agent> | ${{ matrix.manager }} | ~<tokens> | <what they did> |.
          - Assignment/INBOX task done -> check it off / move to "## הושלם" with a one-line English note.
          - Commit to THIS branch (end message with Co-Authored-By). Do NOT touch main. One task per run, then stop.
          PROMPT
          )" \
            --model claude-sonnet-4-6 \
            --permission-mode acceptEdits \
            --allowedTools \
              "Edit" "Write" "Read" "Glob" "Grep" "Task" "WebSearch" "WebFetch" \
              "Bash(git add:*)" "Bash(git commit:*)" "Bash(git status:*)" \
              "Bash(git log:*)" "Bash(git diff:*)" "Bash(git revert:*)" "Bash(git checkout:*)" \
              "Bash(npm install:*)" "Bash(npm run:*)" "Bash(npx playwright:*)" \
              "Bash(node:*)" "Bash(python3:*)" "Bash(awk:*)" "Bash(curl:*)" \
              "Bash(venv312/bin/uvicorn:*)" "Bash(uvicorn:*)" \
              "Bash(pip install:*)" "Bash(pip3 install:*)" \
              "Bash(bash scripts/tg.sh:*)" "Bash(node scripts/shot.mjs:*)" "Bash(python3 scripts/chart.py:*)" \
              "Bash(sqlite3:*)" \
            --output-format text 2>&1 | tee /tmp/claude_out.txt
          CODE=${PIPESTATUS[0]}
          set -e
          if [ "$CODE" -ne 0 ]; then
            if grep -qiE "session limit|usage limit|hit your|reached your .*limit|rate.?limit|overloaded|resets [0-9]" /tmp/claude_out.txt; then
              echo "::notice::Claude account/session limit reached — skipping ${{ matrix.manager }} this cycle (no work lost; retries next cycle)."
              exit 0   # graceful skip: NOT a failure -> no failure email
            fi
            # REVOKED TOKEN — the recurring one (a /login on the founder's Max account invalidates
            # this shared OAuth token). It is NOT a code failure and must not spam failure emails;
            # it needs the founder to refresh ONE secret. Detect it, send ONE clear Telegram alert
            # with the exact fix, self-pause so the other lanes stop 401-ing all cycle, exit 0.
            if grep -qiE "revoked|401|Failed to authenticate|invalid.*token|token.*(expired|invalid)|OAuth" /tmp/claude_out.txt; then
              echo "::warning::CLAUDE_CODE_OAUTH_TOKEN revoked — pausing + alerting founder (no code failure)."
              if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
                curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                  --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
                  --data-urlencode text="🔑 AWEAR agents PAUSED — the OAuth token was revoked (this happens whenever you /login or refresh your Max account; the shared token dies with it). Nothing is broken in the code. To resume: run  ~/.local/bin/claude setup-token  → paste into GitHub secret CLAUDE_CODE_OAUTH_TOKEN → then delete the .agents_paused file (or ask Claude to). All engine work is ready and waiting." >/dev/null 2>&1 || true
              fi
              # self-pause so the remaining lanes/cycles don't each 401 and email
              if [ -n "$GH_PAT" ] || [ -n "$GITHUB_TOKEN" ]; then
                printf 'PAUSED (auto) %s — OAuth token revoked (401). Refresh CLAUDE_CODE_OAUTH_TOKEN then delete this file.\n' "$(date -u +%FT%TZ)" > .agents_paused
                git add .agents_paused 2>/dev/null && git -c user.name=jeff -c user.email=jeff@awear.local commit -m "chore(auto-pause): OAuth token revoked — alerted founder [skip ci]" >/dev/null 2>&1 || true
                git push origin HEAD:main >/dev/null 2>&1 || true
              fi
              exit 0   # handled: alerted + paused, NOT a failure email
            fi
            echo "::error::claude exited $CODE for a non-quota reason"; exit "$CODE"
          fi

      - name: Push manager branch (never main)
        if: steps.gate.outputs.skip != 'true'
        run: |
          git push origin "HEAD:auto/${{ matrix.manager }}" || echo "nothing to push"
      # NOTE: removed the old "Self-diagnostic" step that had every parallel lane checkout main,
      # commit a ci-debug/mgr-*.txt status file, and race to push to main. With 3-6 lanes pushing
      # to main at once it caused merge races + failures + commit noise (audit waste-pattern #2:
      # "33 debug status commits"). Run health is visible via `gh run list` / the Actions UI.

# PRODUCTION two-way Telegram bridge (promoted from "temp test" 2026-07-05 — it IS the
# primary channel: the local telegram_bot.py has no supervisor and is optional).
# Polls getUpdates every 2 min, runs the real routing logic from telegram_bot.py
# (/task, @agent, /status, auth), and replies. Sends go through scripts/tglib.py.
name: telegram-poll

on:
  workflow_dispatch: {}
  push:
    paths: ['.tg_poll_trigger']
  schedule:
    - cron: '*/2 * * * *'

permissions:
  contents: write

concurrency:
  group: telegram-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Poll + route + reply
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ANTHROPIC_API_KEY: dummy   # only so telegram_bot imports; command path doesn't use it
        run: |
          [ -z "$TG_TOKEN" ] && { echo "no token"; exit 0; }
          pip -q install anthropic python-dotenv >/dev/null 2>&1 || true
          python3 - <<'PY'
          import os, sys
          sys.path.insert(0, "scripts")
          import tglib                     # canonical layer: chunking, retries, 429, audit log
          import telegram_bot as tb
          TOKEN = os.environ["TG_TOKEN"].strip()
          r = tglib.api("getUpdates", {"offset": tglib.load_offset(".tg_offset"), "timeout": 0}, token=TOKEN)
          off = tglib.load_offset(".tg_offset")
          acted = 0
          for u in r.get("result", []):
              off = u["update_id"] + 1
              m = u.get("message") or {}
              if "text" not in m: continue
              uid = m.get("from", {}).get("id", 0)
              who = m.get("from", {}).get("first_name") or str(uid)
              chat = str(m["chat"]["id"])
              if not tb._is_allowed(uid):
                  tglib.send_text("בוט פרטי לצוות Awear.", chat_id=chat, markdown=False, token=TOKEN); continue
              reply = tb._parse_command(m["text"], who)
              if reply is None:
                  reply = f"✅ קיבלתי: \"{m['text']}\". הבוט עובד! (פקודות: /task <משימה> · @<סוכן> <משימה> · /status · /pause)"
              tglib.send_text(reply, chat_id=chat, markdown=False, token=TOKEN)
              acted += 1
          tglib.save_offset(".tg_offset", off)
          os.makedirs("ci-debug", exist_ok=True)
          open("ci-debug/poll.txt", "w").write(f"updates_seen={len(r.get('result', []))} processed={acted} offset={off}\n")
          # If a founder routed work (@agent task / /task), fire the managers workflow NOW by
          # touching its push-path trigger — a command should launch agents, not wait for cron.
          import subprocess
          changed = subprocess.run(["git", "status", "--porcelain",
                                    ".claude/agents/assignments", ".claude/master/INBOX.md"],
                                   capture_output=True, text=True).stdout.strip()
          if changed:
              open(".agents_trigger", "w").write("telegram-routed\n")
              print("routed work detected -> touched .agents_trigger (managers run will fire on push)")
          print(f"processed {acted} message(s)")
          PY
      - name: Commit offset + any routed tasks
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          git config user.name "awear-bot"; git config user.email "bot@awear.local"
          git add .tg_offset ci-debug/poll.txt .agents_trigger .claude/agents/assignments .claude/master/INBOX.md .agents_paused 2>/dev/null || true
          if ! git diff --cached --quiet; then
            # [skip ci] would ALSO suppress the .agents_trigger push-trigger for the managers
            # workflow — so use it only for offset-only housekeeping commits.
            if git diff --cached --name-only | grep -qE 'assignments|INBOX.md|.agents_trigger'; then
              git commit -m "chore(tg): routed founder task from Telegram"
            else
              git commit -m "chore(tg): poll offset [skip ci]"
            fi
            PUSHED=false
            for i in 1 2 3; do
              if git pull --rebase origin main -q && git push origin HEAD:main; then PUSHED=true; break; fi
              sleep 3
            done
            # HONEST ACK: the founder already got a ✅ from the poll step. If the push failed,
            # the routed task never reached the repo — tell them instead of dropping it silently.
            if [ "$PUSHED" = "false" ]; then
              TELEGRAM_BOT_TOKEN="$TG_TOKEN" TELEGRAM_CHAT_ID="$TG_CHAT" \
                bash scripts/tg.sh text "❌ AWEAR: המשימה ששלחת בטלגרם לא נקלטה (push נכשל אחרי 3 ניסיונות). שלחי אותה שוב." || true
              exit 1
            fi
          else echo "nothing to commit"; fi

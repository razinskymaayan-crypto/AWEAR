<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>AWEAR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0e; --bg2: #111118; --card: #17171f;
    --accent: #ff3d77; --accent2: #7b5cff; --text: #f6f6f9; --muted: #8e8e9c; --line: #24242e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: "Heebo", -apple-system, system-ui, sans-serif;
    background: radial-gradient(140% 100% at 50% 0%, #15131f 0%, #000 70%);
    color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .phone { width: 390px; height: 844px; max-width: 100vw; max-height: 100vh;
    background: linear-gradient(180deg, var(--bg2), var(--bg)); position: relative; overflow: hidden;
    display: flex; flex-direction: column; border-radius: 30px;
    box-shadow: 0 30px 80px rgba(123,92,255,.28), 0 0 0 1px rgba(255,255,255,.04); }
  @media (max-width: 430px) { .phone { border-radius: 0; height: 100vh; } }

  header { padding: 18px 20px 12px; display: flex; align-items: center; justify-content: space-between;
    position: relative; z-index: 5; flex-shrink: 0; }
  .logo { font-family: "Poppins", sans-serif; font-weight: 800; font-size: 26px; letter-spacing: -1px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  .logo .pin { font-size: 12px; color: var(--muted); font-weight: 500; margin-inline-start: 6px;
    -webkit-text-fill-color: var(--muted); }
  .ava { width: 36px; height: 36px; border-radius: 50%; position: relative;
    background: linear-gradient(135deg, var(--accent2), var(--accent)); }
  .ava::after { content: ""; position: absolute; inset: 2px; border-radius: 50%; background: var(--bg2); }

  main { flex: 1; overflow-y: auto; padding: 4px 14px 96px; scrollbar-width: none; min-height: 0; }
  main::-webkit-scrollbar { display: none; }
  main.feed-mode { padding: 0; overflow: hidden; }

  nav { position: absolute; bottom: 0; left: 0; right: 0; height: 76px;
    background: rgba(10,10,14,.86); backdrop-filter: blur(16px); border-top: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-around; z-index: 10; }
  nav button { background: none; border: 0; color: var(--muted); font-size: 11px; font-weight: 600;
    font-family: inherit; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
  nav button.active { color: var(--text); }
  nav .ico { display: flex; align-items: center; justify-content: center; height: 24px; }
  .fab { width: 58px; height: 58px; border-radius: 50%; border: 0; cursor: pointer;
    background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(255,61,119,.5);
    transform: translateY(-12px); transition: transform .15s; }
  .fab:active { transform: translateY(-12px) scale(.92); }

  .view { display: none; animation: fade .25s ease; }
  .view.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ---- closet base ---- */
  .hint { text-align: center; color: var(--muted); padding: 56px 26px; }
  .hint .big { font-size: 60px; margin-bottom: 16px; filter: drop-shadow(0 8px 20px rgba(123,92,255,.4)); }
  .hint h2 { color: var(--text); font-size: 20px; font-weight: 800; margin-bottom: 8px; }
  .hint p { font-size: 14px; line-height: 1.6; }
  .hint .cta { margin-top: 18px; display: inline-block; font-size: 13px; color: var(--accent); font-weight: 700; }
  .shop-look { display: flex; align-items: center; justify-content: center; gap: 8px;
    margin: 2px 0 16px; padding: 14px; border-radius: 15px; font-weight: 900; font-size: 15px;
    color: #111; background: #fff; border: 0; cursor: pointer; width: 100%; font-family: inherit;
    box-shadow: 0 6px 20px rgba(255,255,255,.12); }
  .share-look { color: #fff; background: linear-gradient(135deg, var(--accent2), var(--accent));
    margin-top: -8px; box-shadow: 0 6px 20px rgba(123,92,255,.3); }
  .stylist { background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 14px 16px; margin: 0 0 14px; }
  .stylist-h { font-weight: 800; font-size: 13px; margin-bottom: 5px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  .stylist p { color: rgba(246,246,249,.82); font-size: 13.5px; line-height: 1.55; }
  .loading { text-align: center; padding: 100px 20px; }
  .spinner { width: 50px; height: 50px; border: 4px solid var(--line); border-top-color: var(--accent);
    border-radius: 50%; margin: 0 auto 20px; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: var(--muted); font-size: 14px; }
  .err { background: rgba(255,61,119,.12); border: 1px solid var(--accent); border-radius: 14px;
    padding: 16px; color: #ffb3c9; font-size: 14px; margin-top: 14px; }

  /* ---- Dolce design system (profile + closet shelves) ---- */
  .ig-head { display: flex; align-items: center; gap: 16px; padding: 8px 4px 16px; }
  .ig-ava { width: 76px; height: 76px; border-radius: 50%; flex-shrink: 0; position: relative;
    background: linear-gradient(135deg, var(--accent2), var(--accent)); padding: 3px; }
  .ig-ava::after { content: ""; position: absolute; inset: 3px; border-radius: 50%;
    background: var(--bg2); }
  .ig-ava .ava-ico { position: absolute; inset: 0; z-index: 1; display: flex; align-items: center;
    justify-content: center; color: var(--accent); }
  .ig-id { flex: 1; min-width: 0; }
  .ig-name { font-weight: 900; font-size: 19px; letter-spacing: -.3px; }
  .ig-handle { color: var(--muted); font-size: 13px; font-weight: 600; margin-top: 3px; }
  .ig-edit { margin-top: 10px; display: inline-block; font-size: 11.5px; font-weight: 800; color: var(--text);
    background: #20202b; border: 1px solid var(--line); border-radius: 10px; padding: 6px 14px;
    cursor: pointer; transition: background .15s; }
  .ig-edit:active { background: #2a2a37; }
  .ig-stats { display: flex; justify-content: space-around; text-align: center; padding: 6px 0 14px;
    border-bottom: 1px solid var(--line); margin-bottom: 14px; }
  .ig-stats > div { display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .ig-stats b { font-size: 18px; font-weight: 900; font-family: "Poppins", sans-serif; }
  .ig-stats span { font-size: 11px; color: var(--muted); font-weight: 700; }
  .ig-bio { font-size: 13px; color: rgba(246,246,249,.82); line-height: 1.55; padding: 0 2px 16px; }
  .ig-bio b { color: var(--text); font-weight: 800; }
  .seg { display: flex; border: 1px solid var(--line); border-radius: 14px; overflow: hidden;
    margin: 0 0 18px; background: var(--card); padding: 4px; gap: 4px; }
  .seg button { flex: 1; padding: 10px 4px; background: none; border: 0; cursor: pointer;
    font-family: inherit; color: var(--muted); font-size: 12.5px; font-weight: 800; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; gap: 5px; transition: background .18s, color .18s; }
  .seg button.on { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff;
    box-shadow: 0 4px 14px rgba(255,61,119,.3); }
  .shelf { margin-bottom: 22px; }
  .shelf-title { display: flex; align-items: center; gap: 8px; font-weight: 900; font-size: 14.5px; margin: 0 2px 12px; }
  .shelf-title .cnt { color: var(--muted); font-size: 12px; font-weight: 700; }
  .shelf-row { display: flex; gap: 12px; overflow-x: auto; padding: 4px 2px 0; scrollbar-width: none; }
  .shelf-row::-webkit-scrollbar { display: none; }
  .shelf-ledge { height: 12px; border-radius: 3px; margin: 0 2px;
    background: linear-gradient(180deg, #7a5636 0%, #5a3e26 45%, #3a2716 100%);
    box-shadow: 0 8px 18px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.18), inset 0 -2px 4px rgba(0,0,0,.4); }
  .ptile { flex-shrink: 0; width: 122px; background: #fbfbfd; border-radius: 16px; padding: 11px;
    cursor: pointer; display: flex; flex-direction: column; box-shadow: 0 8px 18px rgba(0,0,0,.32);
    transition: transform .15s; }
  .ptile:active { transform: scale(.97); }
  .ptile .pimg { height: 88px; display: flex; align-items: center; justify-content: center; font-size: 54px;
    filter: drop-shadow(0 8px 7px rgba(0,0,0,.22)); }
  .ptile .pname { color: #14141a; font-size: 12.5px; font-weight: 800; line-height: 1.25; margin-top: 8px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ptile .pbrand { color: #9a9aa5; font-size: 10px; font-weight: 700; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ptile .pprice { color: #14141a; font-size: 14px; font-weight: 900; margin-top: 5px; font-family: "Poppins", sans-serif; }
  .ptile .pacts { display: flex; gap: 6px; margin-top: 10px; }
  .ptile .pbuy, .ptile .psell { flex: 1; border: 0; border-radius: 9px; padding: 7px 0; font-size: 11px;
    font-weight: 800; cursor: pointer; font-family: inherit; transition: filter .15s; }
  .ptile .pbuy { color: #fff; background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .ptile .psell { color: #3a3a44; background: #ececf2; }
  .ptile .pbuy:active, .ptile .psell:active { filter: brightness(.92); }
  .looks-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
  .look-cell { position: relative; aspect-ratio: 3 / 4; border-radius: 10px; overflow: hidden;
    cursor: pointer; background: linear-gradient(160deg, #a18cd1, #fbc2eb); transition: transform .15s; }
  .look-cell:active { transform: scale(.97); }
  .look-cell img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .look-cell .lc-meta { position: absolute; inset: auto 0 0 0; padding: 16px 8px 7px; font-size: 10.5px;
    font-weight: 800; color: #fff; background: linear-gradient(0deg, rgba(0,0,0,.72), transparent); }
  .earn { background: linear-gradient(135deg, rgba(52,211,153,.18), rgba(123,92,255,.12));
    border: 1px solid rgba(52,211,153,.25); border-radius: 18px; padding: 16px; margin-bottom: 20px; }
  .earn .top { display: flex; align-items: baseline; gap: 8px; }
  .earn .big-num { font-weight: 900; font-size: 26px; color: #34d399; }
  .earn .ttl { font-weight: 800; font-size: 13.5px; }
  .earn p { color: rgba(246,246,249,.7); font-size: 12.5px; line-height: 1.5; margin-top: 6px; }
  .shelf-empty { text-align: center; color: var(--muted); padding: 40px 26px; font-size: 13.5px; line-height: 1.6; }
  .shelf-empty .big { font-size: 44px; margin-bottom: 12px; }
  .listing { display: flex; align-items: center; gap: 12px; background: var(--card);
    border: 1px solid var(--line); border-radius: 16px; padding: 12px; margin-bottom: 10px; }
  .listing .ic { width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0; font-size: 24px;
    display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #20202b, #191922); }
  .listing .info { flex: 1; min-width: 0; }
  .listing .info .nm { font-weight: 800; font-size: 13.5px; line-height: 1.25; }
  .listing .info .sub { color: var(--muted); font-size: 11px; margin-top: 3px; }
  .listing .ask { text-align: end; flex-shrink: 0; }
  .listing .ask .p { font-weight: 900; font-size: 14px; }
  .listing .ask .live { font-size: 9.5px; font-weight: 800; color: #34d399; }
  .listing .ask .live::before { content: "● "; }
  .listing .rm { background: none; border: 0; color: var(--muted); font-size: 18px; cursor: pointer;
    font-family: inherit; padding: 0 2px; flex-shrink: 0; }

  /* ---- Feed TikTok style ---- */
  #feed.view.active { display: flex; flex-direction: column; height: 100%; }

  .feed-filters { display: flex; gap: 8px; padding: 10px 14px; overflow-x: auto; scrollbar-width: none;
    flex-shrink: 0; background: rgba(10,10,14,.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line); z-index: 5; }
  .feed-filters::-webkit-scrollbar { display: none; }
  .ff { flex-shrink: 0; border: 1px solid var(--line); background: transparent; color: var(--muted);
    font-family: inherit; font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 20px;
    cursor: pointer; transition: all .15s; }
  .ff.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .feed-scroll { flex: 1; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
  .feed-scroll::-webkit-scrollbar { display: none; }

  .feed-card-full { position: relative; height: 100%; scroll-snap-align: start; overflow: hidden; background: #111; }
  .feed-card-full.is-mine { outline: 2px solid rgba(255,61,119,.5); outline-offset: -2px; }

  .fcbg { position: absolute; inset: 0; }
  .fcbg .feed-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

  /* double-tap heart burst */
  .heart-burst { position: absolute; top: 46%; left: 50%; z-index: 6; font-size: 100px;
    transform: translate(-50%,-50%) scale(0); opacity: 0; pointer-events: none;
    filter: drop-shadow(0 6px 18px rgba(0,0,0,.45)); }
  .heart-burst.go { animation: burst .8s ease forwards; }
  @keyframes burst {
    0%   { transform: translate(-50%,-50%) scale(0); opacity: 0; }
    18%  { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
    70%  { opacity: 1; }
    100% { transform: translate(-50%,-58%) scale(1); opacity: 0; } }

  .fc-top { position: absolute; top: 14px; left: 14px; right: 14px;
    display: flex; justify-content: space-between; align-items: flex-start; z-index: 5; }
  .mine-tag { background: rgba(255,61,119,.95); color: #fff; font-size: 11px; font-weight: 900;
    padding: 6px 12px; border-radius: 20px; backdrop-filter: blur(6px); }
  .trend-badge { background: rgba(0,0,0,.6); color: #fff; font-size: 12px; font-weight: 900;
    padding: 6px 12px; border-radius: 20px; backdrop-filter: blur(6px); margin-inline-start: auto; }

  /* old fc-actions hidden — replaced by fc-item-pills + fc-action-bar */
  .fc-actions { display: none; }

  /* ---- Item pills (right side) ---- */
  .fc-item-pills { position: absolute; right: 10px; top: 50%; transform: translateY(-55%);
    display: flex; flex-direction: column; gap: 8px; z-index: 5; max-height: 62%; overflow: hidden; }
  .fc-pill { display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: rgba(0,0,0,.52); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.16); border-radius: 16px;
    padding: 10px 8px; cursor: pointer; width: 62px;
    transition: transform .14s, background .14s;
    font-family: inherit; color: #fff; text-align: center; }
  .fc-pill:active { transform: scale(.91); background: rgba(255,255,255,.16); }
  .fc-pill-name { font-size: 10px; font-weight: 800; line-height: 1.2;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 50px; }
  .fc-pill-price { font-size: 10.5px; font-weight: 900; color: rgba(255,255,255,.75);
    font-family: "Poppins", sans-serif; }

  /* ---- Bottom action bar ---- */
  .fc-action-bar { position: absolute; bottom: 0; left: 0; right: 0; z-index: 6;
    display: flex; align-items: center;
    padding: 8px 8px 12px;
    background: linear-gradient(0deg, rgba(0,0,0,.78) 0%, rgba(0,0,0,.3) 70%, transparent 100%); }
  .fca-btn { flex: 1; background: none; border: 0; color: #fff; font-family: inherit;
    font-size: 11px; font-weight: 800; display: flex; flex-direction: column; align-items: center;
    gap: 3px; cursor: pointer; padding: 4px 0; text-shadow: 0 1px 4px rgba(0,0,0,.7); }
  .fca-ico { width: 42px; height: 42px; border-radius: 50%; background: rgba(0,0,0,.42);
    backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center;
    font-size: 20px; transition: transform .14s; border: 1px solid rgba(255,255,255,.12); }
  .fca-btn:active .fca-ico { transform: scale(.84); }
  .fca-btn.liked .fca-ico { background: rgba(255,61,119,.58); }
  .fca-btn.saved .fca-ico { background: rgba(123,92,255,.58); }
  .fca-btn.buy-btn .fca-ico { background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; width: 46px; height: 46px; font-size: 22px; }

  .fc-info { position: absolute; bottom: 76px; left: 0; right: 72px; padding: 16px 14px 0;
    background: linear-gradient(0deg, rgba(0,0,0,.72) 0%, rgba(0,0,0,.3) 60%, transparent 100%); z-index: 5; }
  .fc-user { font-weight: 900; font-size: 15px; color: #fff; margin-bottom: 5px;
    display: flex; align-items: center; gap: 6px; }
  .fc-verified { color: var(--accent); display: inline-flex; align-items: center; }
  .fc-caption { font-size: 13.5px; color: rgba(255,255,255,.9); line-height: 1.4; margin-bottom: 9px; }
  .fc-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .ftag { font-size: 12px; color: rgba(255,255,255,.8); font-weight: 700; }
  .fc-match { display: inline-flex; align-items: center;
    background: linear-gradient(135deg, rgba(123,92,255,.85), rgba(255,61,119,.85));
    color: #fff; font-size: 11.5px; font-weight: 900; padding: 5px 12px; border-radius: 20px; }
  .fc-earn { font-size: 11px; color: #34d399; font-weight: 700; margin-top: 6px; }
  .feed-empty { height: 100%; display: flex; flex-direction: column; align-items: center;
    justify-content: center; color: var(--muted); text-align: center; padding: 40px; }
  .feed-empty .big { font-size: 50px; margin-bottom: 14px; }

  /* ---- modal ---- */
  .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.7); display: none;
    align-items: center; justify-content: center; padding: 28px; z-index: 60; backdrop-filter: blur(4px); }
  .modal-overlay.show { display: flex; }
  .modal-card { background: var(--card); border: 1px solid var(--line); border-radius: 22px;
    padding: 28px 22px; text-align: center; width: 100%; animation: pop .25s ease; }
  @keyframes pop { from { transform: scale(.9); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal-card .big { font-size: 48px; margin-bottom: 12px; }
  .modal-card h3 { font-size: 19px; font-weight: 800; margin-bottom: 6px; }
  .modal-card p { color: var(--muted); font-size: 14px; line-height: 1.6; }
  .modal-card .earn-line { color: #34d399; font-size: 13px; font-weight: 800; margin-top: 8px; }
  .modal-card .close { margin-top: 20px; padding: 11px 26px; border: 0; border-radius: 13px;
    font-weight: 800; cursor: pointer; color: #fff; font-family: inherit; font-size: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2)); }

  .toast { position: absolute; left: 50%; bottom: 92px; background: rgba(23,23,31,.96);
    border: 1px solid var(--line); color: var(--text); font-size: 13px; font-weight: 700;
    padding: 11px 18px; border-radius: 22px; z-index: 70; box-shadow: 0 8px 24px rgba(0,0,0,.45);
    opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(12px);
    transition: opacity .25s, transform .25s; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  input[type=file] { display: none; }

  /* ---- Feed tabs ---- */
  .feed-top { display: flex; flex-direction: column; flex-shrink: 0;
    background: rgba(10,10,14,.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line); z-index: 5; }
  .feed-tabs { display: flex; padding: 4px 20px 0; }
  .ftab { flex: 1; background: none; border: 0; color: var(--muted); font-family: inherit;
    font-size: 14px; font-weight: 800; padding: 10px 0; cursor: pointer; position: relative; transition: color .15s; }
  .ftab.active { color: var(--text); }
  .ftab.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 32px; height: 2.5px; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; }

  /* ---- Stories bar ---- */
  .stories-bar { display: flex; gap: 14px; padding: 12px 14px 10px; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
  .stories-bar::-webkit-scrollbar { display: none; }
  .story-item { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; flex-shrink: 0; }
  .story-ring { width: 58px; height: 58px; border-radius: 50%; padding: 2.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2)); flex-shrink: 0; }
  .story-ring.seen { background: var(--line); }
  .story-inner { width: 100%; height: 100%; border-radius: 50%; background: var(--bg2);
    border: 2.5px solid var(--bg2); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 24px; }
  .story-name { font-size: 10.5px; font-weight: 700; color: rgba(246,246,249,.8);
    max-width: 62px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ---- Edit profile modal ---- */
  .edit-modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.75);
    z-index: 80; display: none; align-items: flex-end; justify-content: center; }
  .edit-modal-overlay.show { display: flex; }
  .edit-modal { background: linear-gradient(180deg, #1c1c26 0%, var(--card) 100%);
    border-radius: 24px 24px 0 0; border-top: 1px solid rgba(255,255,255,.07);
    padding: 20px 22px 32px; width: 100%; animation: slideUp .28s cubic-bezier(.32,.72,0,1); }

  /* per-item shop chips on each feed card (horizontal scroll) */
  .fc-items { display: flex; gap: 8px; margin-top: 10px; overflow-x: auto; overflow-y: hidden;

<body>
<div class="phone">

  function imgFallback(img){
    const cat = img.getAttribute('data-cat') || '';
    const span = document.createElement('span');
    span.className = 'img-fallback';
    span.innerHTML = icon(catIcon(cat), 40);

  function fmtN(n) { n=Number(n)||0; return n>=1000?(n/1000).toFixed(1).replace('.0','')+'K':''+n; }

  // affiliate retailers (mirror of app.py) — build a real shopping link for any item

  function buildBuyOptions(query){

  // an item always resolves to real stores: use API buy_options, else derive from its name/query

  function openSheetSingle(it, earnAmt, influencerUser){

  // ---- AI stylist heuristic: build outfit combos from the user's closet ----
  // For a tapped item, pick complementary categories and prefer closet pieces that
  // share style_tags / color with it. Returns up to 3 combos, each = [item, ...closetPieces].
  const COMPLEMENTS = {
    top:       ['bottoms','shoes','bag','accessory','outerwear'],
    bottoms:   ['top','shoes','outerwear','bag'],
    dress:     ['shoes','bag','outerwear','accessory'],
    outerwear: ['top','bottoms','shoes','dress'],
    shoes:     ['top','bottoms','dress','bag'],
    bag:       ['top','dress','shoes','bottoms'],
    accessory: ['top','dress','bottoms','outerwear'],
    jewelry:   ['top','dress','outerwear'],
    hat:       ['top','dress','outerwear'],
  };
  const COMBO_CAPTIONS = ['מתאים עם','לוק לערב','קז׳ואל ליום־יום','ערכה מהארון שלך'];
  function itemTagSet(it){
    const s=new Set();((it&&it.style_tags)||[]).forEach(t=>s.add(String(t).toLowerCase()));
    if(it&&it.color) s.add(String(it.color).toLowerCase());
    return s;
  }
  // score a closet piece by tag/color overlap with the source item (higher = better match)
  function affinity(src,cand){
    const a=itemTagSet(src), b=itemTagSet(cand); let score=0;
    b.forEach(t=>{if(a.has(t))score++;});
    if(src.color&&cand.color&&String(src.color).toLowerCase()===String(cand.color).toLowerCase())score+=1;
    return score;
  }
  function closetCombos(item, fallbackPool){
    const wardrobe=loadWardrobe();
    const cat=(item.category||'').toLowerCase();
    const order=COMPLEMENTS[cat]||['top','bottoms','shoes'];
    // group closet by category, each list sorted by affinity to the source item
    const byCat={};
    wardrobe.forEach(it=>{
      const c=(it.category||'').toLowerCase();
      if(!c||c===cat&&it.name===item.name) return; // don't pair an item with itself
      (byCat[c]=byCat[c]||[]).push(it);
    });
    Object.keys(byCat).forEach(c=>byCat[c].sort((x,y)=>affinity(item,y)-affinity(item,x)));
    const used=new Set();
    const take=cands=>{
      for(const it of (cands||[])){const k=it.name+'|'+it.category; if(!used.has(k)){used.add(k);return it;}}
      return null;
    };
    const combos=[];
    // primary combos from the closet: each pairs the item with 1-2 complementary pieces
    for(let i=0;i<order.length&&combos.length<3;i++){
      const c=order[i];
      const first=take(byCat[c]); if(!first)continue;
      const pieces=[first];
      // try to add a second complementary piece from a different category
      for(let j=0;j<order.length;j++){
        if(order[j]===c)continue;
        const second=take(byCat[order[j]]);
        if(second){pieces.push(second);break;}
      }
      combos.push({caption:COMBO_CAPTIONS[Math.min(combos.length,COMBO_CAPTIONS.length-1)],pieces});
    }
    // fallback: complement with other items from the same post (different category),
    // so a sparse/empty closet still shows at least one styled combination
    if(combos.length<2 && fallbackPool && fallbackPool.length){
      const others=fallbackPool.filter(x=>x.name!==item.name && (x.category||'').toLowerCase()!==cat
        && !used.has(x.name+'|'+x.category));
      if(others.length){
        combos.push({caption:'מהלוק הזה',pieces:others.slice(0,2),fromPost:true});
      }
    }
    return combos;
  }

  function comboPieceHTML(it,isThis){
    return `<div class="combo-pc${isThis?' is-this':''}">
      <div class="combo-thumb">${productImage(it)}${isThis?`<span class="combo-tag">הפריט</span>`:''}</div>
      <div class="combo-nm">${esc(it.name)}</div>
    </div>`;
  }
  function comboHTML(item,combo){
    const pcs=[comboPieceHTML(item,true)];
    combo.pieces.forEach(p=>pcs.push(comboPieceHTML(p,false)));
    return `<div class="combo">
      <div class="combo-cap"><span class="dot"></span>${esc(combo.caption)}</div>
      <div class="combo-row">${pcs.join(`<span class="combo-plus">${icon('plus',16)}</span>`)}</div>
    </div>`;
  }

  // full item detail sheet: real photo -> match% -> closet combos (AI stylist) -> buy

  function showSheet(){
    sheetOverlay.classList.add('show');
    buySheet.classList.add('show');

    // focus trap — focus on first focusable element inside sheet
    requestAnimationFrame(()=>{

  function closeSheet(){
    sheetOverlay.classList.remove('show');

  sheetOverlay.addEventListener('click', closeSheet);

  // swipe-down to dismiss
  let sheetStartY = null;
  buySheet.addEventListener('pointerdown', e => {
    sheetStartY = e.clientY;
    buySheet.style.transition = 'none'; // instant during drag
  });
  buySheet.addEventListener('pointermove', e => {
    if(sheetStartY === null) return;
    const dy = e.clientY - sheetStartY;
    if(dy > 0) buySheet.style.transform = `translateY(${dy}px)`;
  });
  buySheet.addEventListener('pointerup', e => {
    const dy = e.clientY - (sheetStartY||0);
    buySheet.style.transition = ''; // restore CSS transition
    buySheet.style.transform = '';
    if(dy > 80) closeSheet();
    sheetStartY = null;
  });

    buySheet.style.transform = '';

  function sellFlow(label, price, cat) {
    modal.classList.add('show');
    modalCard.innerHTML = '<div class="spinner"></div><h3>מפרסמת את ' + esc(label) + ' למכירה…</h3><p>ה-AI מתמחר לפי ביקוש בשוק היד-שנייה</p>';

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">${ICONS[catIcon(it.category)]||ICONS.hanger}</svg>
        </span>
        <span class="fc-pill-name">${esc((it.name||'').split(' ').slice(0,2).join(' '))}</span>
        ${(it.price_estimate_ils||it.price)?`<span class="fc-pill-price">₪${esc(it.price_estimate_ils||it.price)}</span>`:''}
      </button>`).join('');

    return `<div class="feed-card-full${isMine?' is-mine':''}" data-id="${attr(post.id||'')}">
      <div class="fcbg" style="background:${attr(post.grad||'linear-gradient(160deg,#a18cd1,#fbc2eb)')}">${bgImg}</div>
      <div class="heart-burst">${icon('heartFill',100)}</div>
      <div class="fc-top">${mineBadge}<span class="trend-badge" style="display:inline-flex;align-items:center;gap:5px">${icon('flame',14)} ${esc(post.trend||80)}</span></div>

      ${pillsHTML?`<div class="fc-item-pills">${pillsHTML}</div>`:''}

      <div class="fc-info">
        <div class="fc-user">@${esc(post.user||'me')}${post.verified?`<span class="fc-verified">${icon('checkCircle',14)}</span>`:''}</div>
        <div class="fc-caption">${esc(post.caption||'')}</div>
        <div class="fc-tags">${tagPills}</div>
        <span class="fc-match">${matchPercent(mtags)}% התאמה לארון שלי</span>
        ${earnLine}
      </div>

      <div class="fc-action-bar">
        <button class="fca-btn${liked?' liked':''}" data-action="like" data-id="${attr(post.id||'')}">
          <div class="fca-ico">${icon(liked?'heartFill':'heart',22)}</div>
          <span>${fmtN((post.likes||0)+(liked?1:0))}</span>
        </button>
        <button class="fca-btn${saved?' saved':''}" data-action="save" data-id="${attr(post.id||'')}">
          <div class="fca-ico">${icon(saved?'bookmarkFill':'bookmark',21)}</div>
          <span>${saved?'נשמר':'שמרי'}</span>
        </button>
        <button class="fca-btn" data-action="share">
          <div class="fca-ico">${icon('share',21)}</div><span>שתפי</span>
        </button>
        <button class="fca-btn buy-btn buy-action"
            data-label="${attr(lbl)}" data-price="${attr(post.price||post.look_total_ils||0)}"
            data-earn="${attr(post.earn||0)}" data-user="${attr(post.user||'')}">
          <div class="fca-ico">${icon('bag',22)}</div>
          <span>₪${esc(post.price||post.look_total_ils||0)}</span>
        </button>
      </div>
    </div>`;
  }

  function renderFeed(){
    const host=document.getElementById('feed-scroll');if(!host)return;
    LIKES=loadSet('awear_likes');SAVED=loadSet('awear_saved');
    host.innerHTML='';
    loadFeedPosts().forEach(p=>{
      const wrap=document.createElement('div');
      wrap.innerHTML=feedCardHTML({...p,id:p.id||'mine_'+p.ts,user:'you',
        grad:p.photo?null:'linear-gradient(160deg,#a18cd1,#fbc2eb)',img:p.photo||null,tags:p.tags||[],trend:95},true);
      host.appendChild(wrap.firstElementChild);
    });
    let seeds=SEED_POSTS;
    if(activeFilter!=='all') seeds=seeds.filter(p=>(p.tags||[]).includes(activeFilter));
    if(!seeds.length&&!loadFeedPosts().length){
      host.innerHTML=`<div class="feed-empty"><div class="big" style="display:flex;justify-content:center">${icon('search',50)}</div><p>אין לוקים בסגנון הזה עדיין</p></div>`;return;
    }
    seeds.forEach(post=>{const wrap=document.createElement('div');wrap.innerHTML=feedCardHTML(post,false);host.appendChild(wrap.firstElementChild);});
  }

  // ---- feed interactions ----
  function burstHeart(card){
    const h=card.querySelector('.heart-burst');if(!h)return;
    h.classList.remove('go');void h.offsetWidth;h.classList.add('go');
  }

  const feedScroll=document.getElementById('feed-scroll');
  // resolve a post (seed or the user's own shared look) by its id
  function feedPostById(id){
    return SEED_POSTS.find(p=>p.id===id) || loadFeedPosts().find(p=>(p.id||'mine_'+p.ts)===id) || null;
  }
  function shopPostItems(post,fallbackLabel,price,earn,user){
    if(post && post.items && post.items.length){
      const total=post.items.reduce((s,x)=>s+(Number(x.price_estimate_ils||x.price)||0),0);
      openSheetLook(post.name?('לוק של '+post.name):(post.caption||fallbackLabel||'הלוק'),
        post.items, price||post.price||post.look_total_ils||total, earn||post.earn||0, user||post.user||'');
      return true;
    }
    return false;
  }

  feedScroll.addEventListener('click',e=>{
    // item pill — open item detail sheet
    const pill=e.target.closest('.fc-pill');
    if(pill){
      const post=feedPostById(pill.dataset.shop);
      const idx=Number(pill.dataset.item);
      const item=post&&post.items&&post.items[idx];
      if(item){
        const enriched={...item, style_tags:(item.style_tags&&item.style_tags.length)?item.style_tags:(post.tags||[])};
        openSheetItem(enriched, post.items);
      }
      return;
    }
    // bottom action bar buttons
    const action=e.target.closest('.fca-btn');if(!action)return;
    if(action.classList.contains('buy-action')||action.classList.contains('buy-btn')){
      // buy handled by main listener below
      return;
    }
    const type=action.dataset.action,id=action.dataset.id;
    if(type==='like'){
      const on=!LIKES.has(id);
      if(on)LIKES.add(id);else LIKES.delete(id);
      saveSet('awear_likes',LIKES);
      const ico=action.querySelector('.fca-ico'),cnt=action.querySelector('span');
      const post=SEED_POSTS.find(p=>p.id===id)||{likes:0};
      ico.innerHTML=icon(on?'heartFill':'heart',22);
      action.classList.toggle('liked',on);
      if(cnt)cnt.textContent=fmtN((post.likes||0)+(on?1:0));
      if(on){ico.style.transform='scale(1.35)';setTimeout(()=>ico.style.transform='',200);}
    }
    if(type==='save'){
      const on=!SAVED.has(id);
      if(on)SAVED.add(id);else SAVED.delete(id);
      saveSet('awear_saved',SAVED);
      const ico=action.querySelector('.fca-ico'),cnt=action.querySelector('span');
      ico.innerHTML=icon(on?'bookmarkFill':'bookmark',21);
      action.classList.toggle('saved',on);
      if(cnt)cnt.textContent=on?'נשמר':'שמרי';
      showToast(on?'נשמר לרשימת המשאלות':'הוסר מהשמורים');
    }
    if(type==='share')showToast('הקישור הועתק');
  });

  let lastTap=0,lastCard=null;
  feedScroll.addEventListener('pointerup',e=>{
    if(e.target.closest('.fca-btn')||e.target.closest('.fc-pill'))return;
    const card=e.target.closest('.feed-card-full');if(!card)return;
    const now=Date.now();
    if(now-lastTap<320&&lastCard===card){
      const id=card.dataset.id;LIKES.add(id);saveSet('awear_likes',LIKES);
      const btn=card.querySelector('[data-action="like"]');
      if(btn){const ico=btn.querySelector('.fca-icon');ico.innerHTML=icon('heartFill',24);ico.classList.add('liked');}
      burstHeart(card);lastTap=0;
    } else {lastTap=now;lastCard=card;}
  });

  // ---- toast ----
  function showToast(msg){
    let t=document.getElementById('toast');
    if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.querySelector('.phone').appendChild(t);}
    t.textContent=msg;t.classList.add('show');clearTimeout(showToast._t);
    showToast._t=setTimeout(()=>t.classList.remove('show'),2400);
  }

  // ---- static UI icons (nav bar) ----
  document.getElementById('nav-ico-closet').innerHTML = icon('user', 24);
  document.getElementById('nav-ico-feed').innerHTML   = icon('play', 24);
  document.getElementById('nav-ico-fab').innerHTML    = icon('plus', 28);

  // ---- Edit profile ----
  const editOverlay = document.getElementById('edit-profile-overlay');
  let editPhotoData = null;

  function openEditProfile(){
    const prof = loadProfile();
    document.getElementById('edit-name').value    = prof.name||'';
    document.getElementById('edit-handle').value  = prof.handle||'';
    document.getElementById('edit-city').value    = prof.city||'';
    document.getElementById('edit-bio').value     = prof.bio||'';
    editPhotoData = prof.photo||null;
    const prev = document.getElementById('edit-photo-preview');
    prev.innerHTML = prof.photo
      ? `<img src="${attr(prof.photo)}" alt="">`
      : icon('user', 32);
    editOverlay.classList.add('show');
  }

  document.getElementById('edit-cancel-btn').addEventListener('click',()=>editOverlay.classList.remove('show'));
  editOverlay.addEventListener('click',e=>{ if(e.target===editOverlay) editOverlay.classList.remove('show'); });

  document.getElementById('edit-photo-btn').addEventListener('click',()=>document.getElementById('edit-photo-input').click());
  document.getElementById('edit-photo-input').addEventListener('change',e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{
      editPhotoData=r.result;
      document.getElementById('edit-photo-preview').innerHTML=`<img src="${attr(r.result)}" alt="">`;
    };
    r.readAsDataURL(f);
    e.target.value='';
  });

  document.getElementById('edit-save-btn').addEventListener('click',()=>{
    const prof={
      name:  document.getElementById('edit-name').value.trim()  || 'הסטייל שלי',
      handle:document.getElementById('edit-handle').value.trim().replace(/^@/,'') || 'me',
      city:  document.getElementById('edit-city').value.trim()  || 'תל אביב',
      bio:   document.getElementById('edit-bio').value.trim(),
      photo: editPhotoData,
    };
    saveProfile(prof);
    editOverlay.classList.remove('show');
    renderCloset();
  });

  // ---- Feed tabs ----
  let activeTab = 'foryou';
  document.querySelectorAll('.ftab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.ftab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    activeTab = t.dataset.tab;
    renderFeed();
  }));

  // ---- Stories data ----
  const STORIES = [
    {id:'st0', name:'הוסיפי סטורי', emoji:'➕', seen:false, isAdd:true},
    {id:'st1', name:'Y2K Challenge', emoji:'✨', seen:false},
    {id:'st2', name:'נועה', emoji:'🌸', seen:false},
    {id:'st3', name:'יעל', emoji:'💜', seen:true},
    {id:'st4', name:'מינימל יום', emoji:'🤍', seen:false},
    {id:'st5', name:'מיקה', emoji:'♻️', seen:true},
    {id:'st6', name:'Streetwear', emoji:'🔥', seen:false},
  ];
  let seenStories = new Set(JSON.parse(localStorage.getItem('awear_stories_seen')||'[]'));

  function renderStories(){
    const bar = document.createElement('div');
    bar.className = 'stories-bar';
    bar.innerHTML = STORIES.map(s=>{
      const seen = !s.isAdd && seenStories.has(s.id);
      return `<div class="story-item" data-story="${attr(s.id)}">
        <div class="story-ring${seen?' seen':''}">
          <div class="story-inner">${s.emoji}</div>
        </div>
        <span class="story-name">${esc(s.name)}</span>
      </div>`;
    }).join('');
    bar.addEventListener('click',e=>{
      const item=e.target.closest('.story-item');
      if(!item||item.dataset.story==='st0') return;
      seenStories.add(item.dataset.story);
      localStorage.setItem('awear_stories_seen',JSON.stringify([...seenStories]));
      item.querySelector('.story-ring').classList.add('seen');
      showToast('סטורי נצפה');
    });
    return bar;
  }

  // ---- Following empty state ----
  function renderFollowingEmpty(){
    const div = document.createElement('div');
    div.className = 'feed-empty';
    div.innerHTML = `<div class="big" style="display:flex;justify-content:center">${icon('heart',50)}</div>
      <p style="margin-top:14px;font-size:15px;font-weight:800;color:var(--text)">עדיין לא עוקבת אחרי אף אחת</p>
      <p style="margin-top:8px;font-size:13px;color:var(--muted);line-height:1.6">עברי לפיד "בשבילי", גלי לוקים<br/>ולחצי על שם המשתמשת כדי לעקוב</p>`;
    return div;
  }

  // patch renderFeed to support tabs + stories
  const _origRenderFeed = renderFeed;
  renderFeed = function(){
    const host=document.getElementById('feed-scroll'); if(!host) return;
    host.innerHTML='';
    if(activeTab==='following'){
      host.appendChild(renderFollowingEmpty());
      return;
    }
    // stories at top of foryou
    host.appendChild(renderStories());
    // then the regular feed cards
    _origRenderFeed.call(this);
    // move the stories into position (renderFeed clears host, so re-inject)
  };

  // override: renderFeed adds cards to host — we need stories first
  // Re-implement cleanly:
  renderFeed = function(){
    const host=document.getElementById('feed-scroll'); if(!host) return;
    LIKES=loadSet('awear_likes'); SAVED=loadSet('awear_saved');
    host.innerHTML='';
    if(activeTab==='following'){
      host.appendChild(renderFollowingEmpty());
      return;
    }
    host.appendChild(renderStories());
    // user's own posts
    loadFeedPosts().forEach(p=>{
      const wrap=document.createElement('div');
      wrap.innerHTML=feedCardHTML({...p,id:p.id||'mine_'+p.ts,user:'you',
        grad:p.photo?null:'linear-gradient(160deg,#a18cd1,#fbc2eb)',img:p.photo||null,tags:p.tags||[],trend:95},true);
      host.appendChild(wrap.firstElementChild);
    });
    let seeds=SEED_POSTS;
    if(activeFilter!=='all') seeds=seeds.filter(p=>(p.tags||[]).includes(activeFilter));
    if(!seeds.length&&!loadFeedPosts().length){
      const em=document.createElement('div');em.className='feed-empty';
      em.innerHTML=`<div class="big" style="display:flex;justify-content:center">${icon('search',50)}</div><p>אין לוקים בסגנון הזה עדיין</p>`;
      host.appendChild(em); return;
    }
    seeds.forEach(post=>{const wrap=document.createElement('div');wrap.innerHTML=feedCardHTML(post,false);host.appendChild(wrap.firstElementChild);});
  };

  renderCloset();
  renderFeed();
</script>
</body>
</html>

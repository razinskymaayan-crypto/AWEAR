<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>AWEAR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0e; --bg2: #111118; --card: #17171f;
    --accent: #ff3d77; --accent2: #7b5cff; --text: #f6f6f9; --muted: #8e8e9c; --line: #24242e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: "Heebo", -apple-system, system-ui, sans-serif;
    background: radial-gradient(140% 100% at 50% 0%, #15131f 0%, #000 70%);
    color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .phone { width: 390px; height: 844px; max-width: 100vw; max-height: 100vh;
    background: linear-gradient(180deg, var(--bg2), var(--bg)); position: relative; overflow: hidden;
    display: flex; flex-direction: column; border-radius: 30px;
    box-shadow: 0 30px 80px rgba(123,92,255,.28), 0 0 0 1px rgba(255,255,255,.04); }
  @media (max-width: 430px) { .phone { border-radius: 0; height: 100vh; } }

  header { padding: 18px 20px 12px; display: flex; align-items: center; justify-content: space-between;
    position: relative; z-index: 5; flex-shrink: 0; }
  .logo { font-family: "Poppins", sans-serif; font-weight: 800; font-size: 26px; letter-spacing: -1px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  .logo .pin { font-size: 12px; color: var(--muted); font-weight: 500; margin-inline-start: 6px;
    -webkit-text-fill-color: var(--muted); }
  .ava { width: 36px; height: 36px; border-radius: 50%; position: relative;
    background: linear-gradient(135deg, var(--accent2), var(--accent)); }
  .ava::after { content: ""; position: absolute; inset: 2px; border-radius: 50%; background: var(--bg2); }

  main { flex: 1; overflow-y: auto; padding: 4px 14px 96px; scrollbar-width: none; min-height: 0; }
  main::-webkit-scrollbar { display: none; }
  main.feed-mode { padding: 0; overflow: hidden; }

  nav { position: absolute; bottom: 0; left: 0; right: 0; height: 76px;
    background: rgba(10,10,14,.86); backdrop-filter: blur(16px); border-top: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-around; z-index: 10; }
  nav button { background: none; border: 0; color: var(--muted); font-size: 11px; font-weight: 600;
    font-family: inherit; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
  nav button.active { color: var(--text); }
  nav .ico { font-size: 22px; }
  .fab { width: 58px; height: 58px; border-radius: 50%; border: 0; cursor: pointer;
    background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-size: 30px;
    font-weight: 300; box-shadow: 0 8px 24px rgba(255,61,119,.5);
    transform: translateY(-12px); transition: transform .15s; }
  .fab:active { transform: translateY(-12px) scale(.92); }

  .view { display: none; animation: fade .25s ease; }
  .view.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ---- closet base ---- */
  .hint { text-align: center; color: var(--muted); padding: 56px 26px; }
  .hint .big { font-size: 60px; margin-bottom: 16px; filter: drop-shadow(0 8px 20px rgba(123,92,255,.4)); }
  .hint h2 { color: var(--text); font-size: 20px; font-weight: 800; margin-bottom: 8px; }
  .hint p { font-size: 14px; line-height: 1.6; }
  .hint .cta { margin-top: 18px; display: inline-block; font-size: 13px; color: var(--accent); font-weight: 700; }
  .shop-look { display: flex; align-items: center; justify-content: center; gap: 8px;
    margin: 2px 0 16px; padding: 14px; border-radius: 15px; font-weight: 900; font-size: 15px;
    color: #111; background: #fff; border: 0; cursor: pointer; width: 100%; font-family: inherit;
    box-shadow: 0 6px 20px rgba(255,255,255,.12); }
  .share-look { color: #fff; background: linear-gradient(135deg, var(--accent2), var(--accent));
    margin-top: -8px; box-shadow: 0 6px 20px rgba(123,92,255,.3); }
  .stylist { background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 14px 16px; margin: 0 0 14px; }
  .stylist-h { font-weight: 800; font-size: 13px; margin-bottom: 5px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  .stylist p { color: rgba(246,246,249,.82); font-size: 13.5px; line-height: 1.55; }
  .loading { text-align: center; padding: 100px 20px; }
  .spinner { width: 50px; height: 50px; border: 4px solid var(--line); border-top-color: var(--accent);
    border-radius: 50%; margin: 0 auto 20px; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: var(--muted); font-size: 14px; }
  .err { background: rgba(255,61,119,.12); border: 1px solid var(--accent); border-radius: 14px;
    padding: 16px; color: #ffb3c9; font-size: 14px; margin-top: 14px; }

  /* ---- Dolce design system (profile + closet shelves) ---- */
  .ig-head { display: flex; align-items: center; gap: 16px; padding: 8px 4px 16px; }
  .ig-ava { width: 76px; height: 76px; border-radius: 50%; flex-shrink: 0; position: relative;
    background: linear-gradient(135deg, var(--accent2), var(--accent)); padding: 3px; }
  .ig-ava::after { content: "👧"; position: absolute; inset: 3px; border-radius: 50%;
    background: var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 36px; }
  .ig-id { flex: 1; min-width: 0; }
  .ig-name { font-weight: 900; font-size: 19px; letter-spacing: -.3px; }
  .ig-handle { color: var(--muted); font-size: 13px; font-weight: 600; margin-top: 3px; }
  .ig-edit { margin-top: 10px; display: inline-block; font-size: 11.5px; font-weight: 800; color: var(--text);
    background: #20202b; border: 1px solid var(--line); border-radius: 10px; padding: 6px 14px;
    cursor: pointer; transition: background .15s; }
  .ig-edit:active { background: #2a2a37; }
  .ig-stats { display: flex; justify-content: space-around; text-align: center; padding: 6px 0 14px;
    border-bottom: 1px solid var(--line); margin-bottom: 14px; }
  .ig-stats > div { display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .ig-stats b { font-size: 18px; font-weight: 900; font-family: "Poppins", sans-serif; }
  .ig-stats span { font-size: 11px; color: var(--muted); font-weight: 700; }
  .ig-bio { font-size: 13px; color: rgba(246,246,249,.82); line-height: 1.55; padding: 0 2px 16px; }
  .ig-bio b { color: var(--text); font-weight: 800; }
  .seg { display: flex; border: 1px solid var(--line); border-radius: 14px; overflow: hidden;
    margin: 0 0 18px; background: var(--card); padding: 4px; gap: 4px; }
  .seg button { flex: 1; padding: 10px 4px; background: none; border: 0; cursor: pointer;
    font-family: inherit; color: var(--muted); font-size: 12.5px; font-weight: 800; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; gap: 5px; transition: background .18s, color .18s; }
  .seg button.on { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff;
    box-shadow: 0 4px 14px rgba(255,61,119,.3); }
  .shelf { margin-bottom: 22px; }
  .shelf-title { display: flex; align-items: center; gap: 8px; font-weight: 900; font-size: 14.5px; margin: 0 2px 12px; }
  .shelf-title .cnt { color: var(--muted); font-size: 12px; font-weight: 700; }
  .shelf-row { display: flex; gap: 12px; overflow-x: auto; padding: 4px 2px 0; scrollbar-width: none; }
  .shelf-row::-webkit-scrollbar { display: none; }
  .shelf-ledge { height: 12px; border-radius: 3px; margin: 0 2px;
    background: linear-gradient(180deg, #7a5636 0%, #5a3e26 45%, #3a2716 100%);
    box-shadow: 0 8px 18px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.18), inset 0 -2px 4px rgba(0,0,0,.4); }
  .ptile { flex-shrink: 0; width: 122px; background: #fbfbfd; border-radius: 16px; padding: 11px;
    cursor: pointer; display: flex; flex-direction: column; box-shadow: 0 8px 18px rgba(0,0,0,.32);
    transition: transform .15s; }
  .ptile:active { transform: scale(.97); }
  .ptile .pimg { height: 88px; display: flex; align-items: center; justify-content: center; font-size: 54px;
    filter: drop-shadow(0 8px 7px rgba(0,0,0,.22)); }
  .ptile .pname { color: #14141a; font-size: 12.5px; font-weight: 800; line-height: 1.25; margin-top: 8px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ptile .pbrand { color: #9a9aa5; font-size: 10px; font-weight: 700; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ptile .pprice { color: #14141a; font-size: 14px; font-weight: 900; margin-top: 5px; font-family: "Poppins", sans-serif; }
  .ptile .pacts { display: flex; gap: 6px; margin-top: 10px; }
  .ptile .pbuy, .ptile .psell { flex: 1; border: 0; border-radius: 9px; padding: 7px 0; font-size: 11px;
    font-weight: 800; cursor: pointer; font-family: inherit; transition: filter .15s; }
  .ptile .pbuy { color: #fff; background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .ptile .psell { color: #3a3a44; background: #ececf2; }
  .ptile .pbuy:active, .ptile .psell:active { filter: brightness(.92); }
  .looks-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
  .look-cell { position: relative; aspect-ratio: 3 / 4; border-radius: 10px; overflow: hidden;
    cursor: pointer; background: linear-gradient(160deg, #a18cd1, #fbc2eb); transition: transform .15s; }
  .look-cell:active { transform: scale(.97); }
  .look-cell img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .look-cell .lc-meta { position: absolute; inset: auto 0 0 0; padding: 16px 8px 7px; font-size: 10.5px;
    font-weight: 800; color: #fff; background: linear-gradient(0deg, rgba(0,0,0,.72), transparent); }
  .earn { background: linear-gradient(135deg, rgba(52,211,153,.18), rgba(123,92,255,.12));
    border: 1px solid rgba(52,211,153,.25); border-radius: 18px; padding: 16px; margin-bottom: 20px; }
  .earn .top { display: flex; align-items: baseline; gap: 8px; }
  .earn .big-num { font-weight: 900; font-size: 26px; color: #34d399; }
  .earn .ttl { font-weight: 800; font-size: 13.5px; }
  .earn p { color: rgba(246,246,249,.7); font-size: 12.5px; line-height: 1.5; margin-top: 6px; }
  .shelf-empty { text-align: center; color: var(--muted); padding: 40px 26px; font-size: 13.5px; line-height: 1.6; }
  .shelf-empty .big { font-size: 44px; margin-bottom: 12px; }
  .listing { display: flex; align-items: center; gap: 12px; background: var(--card);
    border: 1px solid var(--line); border-radius: 16px; padding: 12px; margin-bottom: 10px; }
  .listing .ic { width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0; font-size: 24px;
    display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #20202b, #191922); }
  .listing .info { flex: 1; min-width: 0; }
  .listing .info .nm { font-weight: 800; font-size: 13.5px; line-height: 1.25; }
  .listing .info .sub { color: var(--muted); font-size: 11px; margin-top: 3px; }
  .listing .ask { text-align: end; flex-shrink: 0; }
  .listing .ask .p { font-weight: 900; font-size: 14px; }
  .listing .ask .live { font-size: 9.5px; font-weight: 800; color: #34d399; }
  .listing .ask .live::before { content: "● "; }
  .listing .rm { background: none; border: 0; color: var(--muted); font-size: 18px; cursor: pointer;
    font-family: inherit; padding: 0 2px; flex-shrink: 0; }

  /* ---- Feed TikTok style ---- */
  #feed.view.active { display: flex; flex-direction: column; height: 100%; }

  .feed-filters { display: flex; gap: 8px; padding: 10px 14px; overflow-x: auto; scrollbar-width: none;
    flex-shrink: 0; background: rgba(10,10,14,.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line); z-index: 5; }
  .feed-filters::-webkit-scrollbar { display: none; }
  .ff { flex-shrink: 0; border: 1px solid var(--line); background: transparent; color: var(--muted);
    font-family: inherit; font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 20px;
    cursor: pointer; transition: all .15s; }
  .ff.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .feed-scroll { flex: 1; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
  .feed-scroll::-webkit-scrollbar { display: none; }

  .feed-card-full { position: relative; height: 100%; scroll-snap-align: start; overflow: hidden; background: #111; }
  .feed-card-full.is-mine { outline: 2px solid rgba(255,61,119,.5); outline-offset: -2px; }

  .fcbg { position: absolute; inset: 0; }
  .fcbg .feed-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

  /* double-tap heart burst */
  .heart-burst { position: absolute; top: 46%; left: 50%; z-index: 6; font-size: 100px;
    transform: translate(-50%,-50%) scale(0); opacity: 0; pointer-events: none;
    filter: drop-shadow(0 6px 18px rgba(0,0,0,.45)); }
  .heart-burst.go { animation: burst .8s ease forwards; }
  @keyframes burst {
    0%   { transform: translate(-50%,-50%) scale(0); opacity: 0; }
    18%  { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
    70%  { opacity: 1; }
    100% { transform: translate(-50%,-58%) scale(1); opacity: 0; } }

  .fc-top { position: absolute; top: 14px; left: 14px; right: 14px;
    display: flex; justify-content: space-between; align-items: flex-start; z-index: 5; }
  .mine-tag { background: rgba(255,61,119,.95); color: #fff; font-size: 11px; font-weight: 900;
    padding: 6px 12px; border-radius: 20px; backdrop-filter: blur(6px); }
  .trend-badge { background: rgba(0,0,0,.6); color: #fff; font-size: 12px; font-weight: 900;
    padding: 6px 12px; border-radius: 20px; backdrop-filter: blur(6px); margin-inline-start: auto; }

  .fc-actions { position: absolute; right: 12px; bottom: 110px;
    display: flex; flex-direction: column; align-items: center; gap: 16px; z-index: 5; }
  .fc-action { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer;
    color: #fff; font-size: 10px; font-weight: 800; text-shadow: 0 1px 4px rgba(0,0,0,.6);
    user-select: none; background: none; border: 0; font-family: inherit; padding: 0; }
  .fca-icon { width: 46px; height: 46px; border-radius: 50%; background: rgba(0,0,0,.45);
    backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center;
    font-size: 22px; transition: transform .15s; border: 1px solid rgba(255,255,255,.1); }
  .fc-action:active .fca-icon { transform: scale(.84); }
  .fca-icon.liked { background: rgba(255,61,119,.55); }
  .fca-icon.saved { background: rgba(123,92,255,.55); }
  .buy-action .fca-icon { background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; width: 50px; height: 50px; font-size: 24px; }

  .fc-info { position: absolute; bottom: 0; left: 0; right: 70px; padding: 20px 14px 22px;
    background: linear-gradient(0deg, rgba(0,0,0,.88) 0%, rgba(0,0,0,.4) 55%, transparent 100%); z-index: 5; }
  .fc-user { font-weight: 900; font-size: 15px; color: #fff; margin-bottom: 5px;
    display: flex; align-items: center; gap: 6px; }
  .fc-verified { font-size: 13px; background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  .fc-caption { font-size: 13.5px; color: rgba(255,255,255,.9); line-height: 1.4; margin-bottom: 9px; }
  .fc-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .ftag { font-size: 12px; color: rgba(255,255,255,.8); font-weight: 700; }
  .fc-match { display: inline-flex; align-items: center;
    background: linear-gradient(135deg, rgba(123,92,255,.85), rgba(255,61,119,.85));
    color: #fff; font-size: 11.5px; font-weight: 900; padding: 5px 12px; border-radius: 20px; }
  .fc-earn { font-size: 11px; color: #34d399; font-weight: 700; margin-top: 6px; }
  .feed-empty { height: 100%; display: flex; flex-direction: column; align-items: center;
    justify-content: center; color: var(--muted); text-align: center; padding: 40px; }
  .feed-empty .big { font-size: 50px; margin-bottom: 14px; }

  /* ---- modal ---- */
  .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.7); display: none;
    align-items: center; justify-content: center; padding: 28px; z-index: 60; backdrop-filter: blur(4px); }
  .modal-overlay.show { display: flex; }
  .modal-card { background: var(--card); border: 1px solid var(--line); border-radius: 22px;
    padding: 28px 22px; text-align: center; width: 100%; animation: pop .25s ease; }
  @keyframes pop { from { transform: scale(.9); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal-card .big { font-size: 48px; margin-bottom: 12px; }
  .modal-card h3 { font-size: 19px; font-weight: 800; margin-bottom: 6px; }
  .modal-card p { color: var(--muted); font-size: 14px; line-height: 1.6; }
  .modal-card .earn-line { color: #34d399; font-size: 13px; font-weight: 800; margin-top: 8px; }
  .modal-card .close { margin-top: 20px; padding: 11px 26px; border: 0; border-radius: 13px;
    font-weight: 800; cursor: pointer; color: #fff; font-family: inherit; font-size: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2)); }

  .toast { position: absolute; left: 50%; bottom: 92px; background: rgba(23,23,31,.96);
    border: 1px solid var(--line); color: var(--text); font-size: 13px; font-weight: 700;
    padding: 11px 18px; border-radius: 22px; z-index: 70; box-shadow: 0 8px 24px rgba(0,0,0,.45);
    opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(12px);
    transition: opacity .25s, transform .25s; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  input[type=file] { display: none; }
</style>
</head>
<body>
<div class="phone">
  <header>
    <div class="logo">AWEAR<span class="pin">· תל אביב</span></div>
    <div class="ava"></div>
  </header>

  <main id="main">
    <!-- CLOSET + PROFILE (Dolce) -->
    <section id="closet" class="view active">
      <div id="closet-body"></div>
    </section>

    <!-- FEED -->
    <section id="feed" class="view">
      <div class="feed-filters" id="feed-filters">
        <button class="ff active" data-filter="all">הכל</button>
        <button class="ff" data-filter="y2k">Y2K</button>
        <button class="ff" data-filter="streetwear">Streetwear</button>
        <button class="ff" data-filter="minimal">מינימל</button>
        <button class="ff" data-filter="vintage">וינטג'</button>
        <button class="ff" data-filter="secondhand">יד שנייה</button>
      </div>
      <div class="feed-scroll" id="feed-scroll"></div>
    </section>
  </main>

  <nav>
    <button data-view="closet" class="active"><span class="ico">👤</span>הפרופיל שלי</button>
    <button class="fab" id="capture-btn">＋</button>
    <button data-view="feed"><span class="ico">▶️</span>פיד</button>
  </nav>

  <input type="file" id="file-input" accept="image/*" capture="environment" />
  <div id="purchase-modal" class="modal-overlay"><div class="modal-card" id="modal-card"></div></div>
</div>

<script>
  const fileInput  = document.getElementById('file-input');
  const closetBody = document.getElementById('closet-body');
  const modal      = document.getElementById('purchase-modal');
  const modalCard  = document.getElementById('modal-card');
  const mainEl     = document.getElementById('main');

  const EMOJI = { top:'👕', bottoms:'👖', dress:'👗', outerwear:'🧥', shoes:'👟',
                  bag:'👜', accessory:'🕶️', jewelry:'💍', hat:'🧢' };
  function emojiFor(cat) { return EMOJI[(cat||'').toLowerCase()] || '🧷'; }
  function esc(s)  { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }
  function attr(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
  function fmtN(n) { n=Number(n)||0; return n>=1000?(n/1000).toFixed(1).replace('.0','')+'K':''+n; }

  // ---- navigation ----
  document.querySelectorAll('nav button[data-view]').forEach(b =>
    b.addEventListener('click', () => showView(b.dataset.view)));

  function showView(name) {
    document.querySelectorAll('nav button[data-view]').forEach(x =>
      x.classList.toggle('active', x.dataset.view === name));
    document.querySelectorAll('.view').forEach(v =>
      v.classList.toggle('active', v.id === name));
    mainEl.classList.toggle('feed-mode', name === 'feed');
    if (name === 'closet') renderCloset();
    if (name === 'feed')   renderFeed();
  }

  document.getElementById('capture-btn').addEventListener('click', () => {
    profileTab = 'closet'; showView('closet'); fileInput.click();
  });

  // ---- buy / sell ----
  function buyFlow(label, price, earnAmt, influencerUser) {
    modal.classList.add('show');
    modalCard.innerHTML = '<div class="spinner"></div><h3>רוכשת את ' + esc(label) + '…</h3><p>Awear מבצעת את ההזמנה עבורך</p>';
    setTimeout(() => {
      const earnLine = (earnAmt && influencerUser)
        ? `<div class="earn-line">✓ @${esc(influencerUser)} מרוויחה קרדיט ₪${esc(earnAmt)}</div>` : '';

  function wardrobeTagSet(){
    const set=new Set();
    loadWardrobe().forEach(it=>{(it.style_tags||[]).forEach(t=>set.add(String(t).toLowerCase()));if(it.category)set.add(String(it.category).toLowerCase());});
    return set;
  }
  function matchPercent(tags){
    const s=wardrobeTagSet();if(!s.size)return 72;
    const t=(tags||[]).map(t=>String(t).toLowerCase()).filter(Boolean);if(!t.length)return 72;
    let h=0;t.forEach(x=>{if(s.has(x))h++;});return Math.round(60+(h/t.length)*38);
  }

      if(on){icon.style.transform='scale(1.35)';setTimeout(()=>icon.style.transform='',200);}

    if(now-lastTap<320&&lastCard===card){
      const id=card.dataset.id;LIKES.add(id);saveSet('awear_likes',LIKES);
      const btn=card.querySelector('[data-action="like"]');
      if(btn){const icon=btn.querySelector('.fca-icon');icon.textContent='❤️';icon.classList.add('liked');}
      burstHeart(card);lastTap=0;
    } else {lastTap=now;lastCard=card;}
  });

  // ---- toast ----
  function showToast(msg){
    let t=document.getElementById('toast');
    if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.querySelector('.phone').appendChild(t);}
    t.textContent=msg;t.classList.add('show');clearTimeout(showToast._t);
    showToast._t=setTimeout(()=>t.classList.remove('show'),2400);
  }

  renderCloset();
  renderFeed();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>AWEAR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0e;
    --bg2: #111118;
    --card: #17171f;
    --accent: #ff3d77;
    --accent2: #7b5cff;
    --text: #f6f6f9;
    --muted: #8e8e9c;
    --line: #24242e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: "Heebo", -apple-system, system-ui, sans-serif;
    background: radial-gradient(140% 100% at 50% 0%, #15131f 0%, #000 70%);
    color: var(--text);
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
  .phone {
    width: 390px; height: 844px; max-width: 100vw; max-height: 100vh;
    background: linear-gradient(180deg, var(--bg2), var(--bg));
    position: relative; overflow: hidden; display: flex; flex-direction: column;
    border-radius: 30px; box-shadow: 0 30px 80px rgba(123,92,255,.28), 0 0 0 1px rgba(255,255,255,.04);
  }
  @media (max-width: 430px) { .phone { border-radius: 0; height: 100vh; } }

  header {
    padding: 18px 20px 12px; display: flex; align-items: center; justify-content: space-between;
    position: relative; z-index: 5;
  }
  .logo { font-family: "Poppins", sans-serif; font-weight: 800; font-size: 26px; letter-spacing: -1px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  .logo .pin { font-size: 12px; color: var(--muted); font-weight: 500; margin-inline-start: 6px;
    -webkit-text-fill-color: var(--muted); }
  .ava { width: 36px; height: 36px; border-radius: 50%; position: relative;
    background: linear-gradient(135deg, var(--accent2), var(--accent)); }
  .ava::after { content: ""; position: absolute; inset: 2px; border-radius: 50%; background: var(--bg2); }

  main { flex: 1; overflow-y: auto; padding: 4px 14px 96px; scrollbar-width: none; }
  main::-webkit-scrollbar { display: none; }

  nav {
    position: absolute; bottom: 0; left: 0; right: 0; height: 76px;
    background: rgba(10,10,14,.86); backdrop-filter: blur(16px);
    border-top: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-around; z-index: 10;
  }
  nav button { background: none; border: 0; color: var(--muted); font-size: 11px; font-weight: 600;
    font-family: inherit; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
  nav button.active { color: var(--text); }
  nav .ico { font-size: 22px; }
  .fab {
    width: 58px; height: 58px; border-radius: 50%; border: 0; cursor: pointer;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; font-size: 30px; font-weight: 300; box-shadow: 0 8px 24px rgba(255,61,119,.5);
    transform: translateY(-12px); transition: transform .15s; }
  .fab:active { transform: translateY(-12px) scale(.92); }

  .view { display: none; animation: fade .25s ease; }
  .view.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ---- closet ---- */
  .hint { text-align: center; color: var(--muted); padding: 90px 26px; }
  .hint .big { font-size: 60px; margin-bottom: 16px; filter: drop-shadow(0 8px 20px rgba(123,92,255,.4)); }
  .hint h2 { color: var(--text); font-size: 20px; font-weight: 800; margin-bottom: 8px; }
  .hint p { font-size: 14px; line-height: 1.6; }
  .hint .cta { margin-top: 18px; display: inline-block; font-size: 13px; color: var(--accent); font-weight: 700; }

  .summary { background: linear-gradient(135deg, rgba(123,92,255,.22), rgba(255,61,119,.14));
    border: 1px solid rgba(255,255,255,.07); border-radius: 18px; padding: 16px; margin: 6px 0 14px; }
  .summary .row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .badge { background: rgba(255,255,255,.14); color: #fff; font-size: 12px; font-weight: 800;
    padding: 4px 11px; border-radius: 20px; }
  .summary .style { font-weight: 800; font-size: 15px; }
  .summary p { color: rgba(246,246,249,.8); font-size: 13.5px; line-height: 1.55; }
  .trend { margin-inline-start: auto; font-weight: 900; font-size: 15px; white-space: nowrap;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  .reset { font-size: 11px; color: var(--muted); cursor: pointer; text-decoration: underline; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .item { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 13px;
    display: flex; flex-direction: column; }
  .thumb { width: 100%; height: 92px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
    font-size: 40px; margin-bottom: 10px; background: linear-gradient(135deg, #20202b, #191922); }
  .item .cat { font-size: 10px; color: var(--accent2); font-weight: 800; text-transform: uppercase; letter-spacing: .5px; }
  .item .nm { font-size: 14.5px; font-weight: 800; margin: 3px 0 7px; line-height: 1.25; }
  .item .meta { font-size: 11.5px; color: var(--muted); line-height: 1.55; }
  .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .tag { font-size: 10px; background: #23232e; color: #cfcfe0; padding: 3px 8px; border-radius: 20px; }
  .resale { display: inline-block; margin-top: 8px; font-size: 10.5px; font-weight: 700; padding: 3px 8px; border-radius: 8px; align-self: flex-start; }
  .resale.high { background: rgba(52,211,153,.16); color: #34d399; }
  .resale.medium { background: rgba(251,191,36,.16); color: #fbbf24; }
  .resale.low { background: rgba(148,163,184,.16); color: #94a3b8; }
  .price { font-size: 14px; font-weight: 900; margin-top: 10px; }
  .buy-btn { margin-top: 8px; padding: 9px; border-radius: 11px; font-size: 12.5px; font-weight: 800;
    color: #fff; border: 0; cursor: pointer; width: 100%; font-family: inherit;
    background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .shop-look { display: flex; align-items: center; justify-content: center; gap: 8px;
    margin: 2px 0 16px; padding: 14px; border-radius: 15px; font-weight: 900; font-size: 15px;
    color: #111; background: #fff; border: 0; cursor: pointer; width: 100%; font-family: inherit;
    box-shadow: 0 6px 20px rgba(255,255,255,.12); }
  .share-look { color: #fff; background: linear-gradient(135deg, var(--accent2), var(--accent));
    margin-top: -8px; box-shadow: 0 6px 20px rgba(123,92,255,.3); }
  .actions { display: flex; gap: 7px; margin-top: 8px; }
  .actions .buy-btn { margin-top: 0; flex: 1; }
  .sell-btn { flex: 1; padding: 9px; border-radius: 11px; font-size: 12.5px; font-weight: 800;
    color: var(--text); border: 1px solid var(--line); cursor: pointer; font-family: inherit; background: #20202b; }
  .stylist { background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 14px 16px; margin: 0 0 14px; }
  .stylist-h { font-weight: 800; font-size: 13px; margin-bottom: 5px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  .stylist p { color: rgba(246,246,249,.82); font-size: 13.5px; line-height: 1.55; }

  .loading { text-align: center; padding: 100px 20px; }
  .spinner { width: 50px; height: 50px; border: 4px solid var(--line); border-top-color: var(--accent);
    border-radius: 50%; margin: 0 auto 20px; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: var(--muted); font-size: 14px; }
  .err { background: rgba(255,61,119,.12); border: 1px solid var(--accent); border-radius: 14px;
    padding: 16px; color: #ffb3c9; font-size: 14px; margin-top: 14px; }

  /* ---- feed: TikTok-style immersive vertical scroll ---- */
  .feed-h { font-family: "Poppins", sans-serif; font-weight: 800; padding: 4px 4px 14px; font-size: 15px; }
  /* immersive mode: turn the shared <main> scroller into a full-bleed snap feed */
  main.feed-mode { padding: 0; scroll-snap-type: y mandatory; }
  main.feed-mode .feed-h { display: none; }
  .feed-card { position: relative; border-radius: 20px; overflow: hidden; margin-bottom: 14px;
    height: 500px; display: flex; align-items: flex-end; }
  main.feed-mode .feed-card { height: var(--feed-h, 100%); border-radius: 0; margin-bottom: 0;
    scroll-snap-align: start; scroll-snap-stop: always; }
  .feed-card .bg { position: absolute; inset: 0; }
  .g1 { background: linear-gradient(160deg,#ff9a8b,#ff6a88,#ff99ac); }
  .g2 { background: linear-gradient(160deg,#a18cd1,#fbc2eb); }
  .g3 { background: linear-gradient(160deg,#84fab0,#8fd3f4); }
  .g4 { background: linear-gradient(160deg,#fccb90,#d57eeb); }
  .g5 { background: linear-gradient(160deg,#5ee7df,#b490ca); }
  .feed-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .feed-card .overlay { position: relative; width: 100%; padding: 18px 84px 20px 18px; z-index: 2;
    background: linear-gradient(0deg, rgba(0,0,0,.82), rgba(0,0,0,.12) 70%, transparent); }
  main.feed-mode .feed-card .overlay { padding-bottom: 96px; }  /* clear the bottom nav bar */
  .feed-card .user { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 14px; }
  .feed-card .dot { width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent)); border: 2px solid rgba(255,255,255,.7); }
  .feed-card .cap { font-size: 13.5px; margin: 9px 0 0; line-height: 1.45; }

  /* right-side action rail (TikTok signature) */
  .rail { position: absolute; inset-inline-end: 10px; bottom: 84px; z-index: 3;
    display: flex; flex-direction: column; gap: 15px; align-items: center; }
  main.feed-mode .rail { bottom: 104px; }
  .rail .act { display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: 0; cursor: pointer; font-family: inherit; color: #fff; padding: 0; }
  .rail .ic { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 23px; background: rgba(0,0,0,.34); backdrop-filter: blur(6px);
    transition: transform .15s, background .15s; }
  .rail .act:active .ic { transform: scale(.84); }
  .rail .lbl { font-size: 10.5px; font-weight: 800; text-shadow: 0 1px 4px rgba(0,0,0,.7); }
  .rail .act.on .ic { background: rgba(255,61,119,.92); }
  .rail .act.saved .ic { background: rgba(123,92,255,.92); }

  /* double-tap heart burst */
  .heart-burst { position: absolute; top: 46%; left: 50%; z-index: 4; font-size: 100px;
    transform: translate(-50%,-50%) scale(0); opacity: 0; pointer-events: none;
    filter: drop-shadow(0 6px 18px rgba(0,0,0,.45)); }
  .heart-burst.go { animation: burst .8s ease forwards; }
  @keyframes burst {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 0; }
    18% { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
    70% { opacity: 1; }
    100% { transform: translate(-50%,-58%) scale(1); opacity: 0; } }

  .buy-look { display: inline-flex; align-items: center; gap: 7px; margin-top: 11px;
    background: rgba(255,255,255,.96); color: #111; font-size: 13px; font-weight: 900;
    padding: 11px 17px; border-radius: 24px; border: 0; cursor: pointer; font-family: inherit;
    backdrop-filter: blur(6px); box-shadow: 0 6px 18px rgba(0,0,0,.3); }
  .match-badge { position: absolute; top: 14px; inset-inline-end: 14px; z-index: 3;
    background: linear-gradient(135deg, rgba(123,92,255,.92), rgba(255,61,119,.92));
    color: #fff; font-size: 11.5px; font-weight: 900; padding: 7px 12px; border-radius: 22px;
    backdrop-filter: blur(6px); box-shadow: 0 4px 14px rgba(0,0,0,.3); white-space: nowrap; }
  main.feed-mode .match-badge { top: 18px; }
  .feed-card.mine .match-badge { display: none; }
  .mine-tag { position: absolute; top: 14px; inset-inline-start: 14px; z-index: 3;
    background: rgba(255,61,119,.95); color: #fff; font-size: 11px; font-weight: 900;
    padding: 7px 12px; border-radius: 22px; backdrop-filter: blur(6px); }
  main.feed-mode .mine-tag { top: 18px; inset-inline-start: 18px; }

  /* ---- purchase modal ---- */
  .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.7); display: none;
    align-items: center; justify-content: center; padding: 28px; z-index: 60; backdrop-filter: blur(4px); }
  .modal-overlay.show { display: flex; }
  .modal-card { background: var(--card); border: 1px solid var(--line); border-radius: 22px;
    padding: 28px 22px; text-align: center; width: 100%; animation: pop .25s ease; }
  @keyframes pop { from { transform: scale(.9); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal-card .big { font-size: 48px; margin-bottom: 12px; }
  .modal-card h3 { font-size: 19px; font-weight: 800; margin-bottom: 6px; }
  .modal-card p { color: var(--muted); font-size: 14px; line-height: 1.6; }
  .modal-card .close { margin-top: 20px; padding: 11px 26px; border: 0; border-radius: 13px; font-weight: 800;
    cursor: pointer; color: #fff; font-family: inherit; font-size: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2)); }

  /* ---- profile ---- */
  .pro-head { display: flex; align-items: center; gap: 14px; padding: 8px 4px 18px; }
  .pro-ava { width: 64px; height: 64px; border-radius: 50%; flex-shrink: 0; position: relative;
    background: linear-gradient(135deg, var(--accent2), var(--accent)); }
  .pro-ava::after { content: "👧"; position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; font-size: 30px; }
  .pro-name { font-weight: 900; font-size: 19px; }
  .pro-handle { color: var(--muted); font-size: 13px; font-weight: 600; }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .stat { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 14px 8px; text-align: center; }
  .stat .num { font-weight: 900; font-size: 19px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  .stat .lbl { color: var(--muted); font-size: 10.5px; font-weight: 700; margin-top: 4px; line-height: 1.3; }
  .earn { background: linear-gradient(135deg, rgba(52,211,153,.18), rgba(123,92,255,.12));
    border: 1px solid rgba(52,211,153,.25); border-radius: 18px; padding: 16px; margin-bottom: 20px; }
  .earn .top { display: flex; align-items: baseline; gap: 8px; }
  .earn .big-num { font-weight: 900; font-size: 26px; color: #34d399; }
  .earn .ttl { font-weight: 800; font-size: 13.5px; }
  .earn p { color: rgba(246,246,249,.7); font-size: 12.5px; line-height: 1.5; margin-top: 6px; }
  .sec-h { font-weight: 900; font-size: 15px; margin: 4px 4px 12px; display: flex; align-items: center; gap: 7px; }
  .sec-h .cnt { color: var(--muted); font-size: 12px; font-weight: 700; }
  .shelf-empty { text-align: center; color: var(--muted); padding: 40px 26px; font-size: 13.5px; line-height: 1.6; }
  .shelf-empty .big { font-size: 44px; margin-bottom: 12px; }
  .listing { display: flex; align-items: center; gap: 12px; background: var(--card);
    border: 1px solid var(--line); border-radius: 16px; padding: 12px; margin-bottom: 10px; }
  .listing .ic { width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0; font-size: 24px;
    display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #20202b, #191922); }
  .listing .info { flex: 1; min-width: 0; }
  .listing .info .nm { font-weight: 800; font-size: 13.5px; line-height: 1.25; }
  .listing .info .sub { color: var(--muted); font-size: 11px; margin-top: 3px; }
  .listing .ask { text-align: end; flex-shrink: 0; }
  .listing .ask .p { font-weight: 900; font-size: 14px; }
  .listing .ask .live { font-size: 9.5px; font-weight: 800; color: #34d399; }
  .listing .ask .live::before { content: "● "; }
  .listing .rm { background: none; border: 0; color: var(--muted); font-size: 18px; cursor: pointer;
    font-family: inherit; padding: 0 2px; flex-shrink: 0; }

  .toast { position: absolute; left: 50%; bottom: 92px;
    background: rgba(23,23,31,.96); border: 1px solid var(--line); color: var(--text);
    font-size: 13px; font-weight: 700; padding: 11px 18px; border-radius: 22px; z-index: 70;
    box-shadow: 0 8px 24px rgba(0,0,0,.45); opacity: 0; pointer-events: none;
    transform: translateX(-50%) translateY(12px); transition: opacity .25s, transform .25s; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ============ PROFILE = CLOSET — Dolce design system ============ */
  /* identity header (Instagram-style) */
  .ig-head { display: flex; align-items: center; gap: 16px; padding: 8px 4px 16px; }
  .ig-ava { width: 76px; height: 76px; border-radius: 50%; flex-shrink: 0; position: relative;
    background: linear-gradient(135deg, var(--accent2), var(--accent)); padding: 3px; }
  .ig-ava::after { content: "👧"; position: absolute; inset: 3px; border-radius: 50%;
    background: var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 36px; }
  .ig-id { flex: 1; min-width: 0; }
  .ig-name { font-weight: 900; font-size: 19px; letter-spacing: -.3px; }
  .ig-handle { color: var(--muted); font-size: 13px; font-weight: 600; margin-top: 3px; }
  .ig-edit { margin-top: 10px; display: inline-block; font-size: 11.5px; font-weight: 800; color: var(--text);
    background: #20202b; border: 1px solid var(--line); border-radius: 10px; padding: 6px 14px; cursor: pointer;
    transition: background .15s; }
  .ig-edit:active { background: #2a2a37; }

  /* stats row */
  .ig-stats { display: flex; justify-content: space-around; text-align: center; padding: 6px 0 14px;
    border-bottom: 1px solid var(--line); margin-bottom: 14px; }
  .ig-stats > div { display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .ig-stats b { font-size: 18px; font-weight: 900; font-family: "Poppins", sans-serif; }
  .ig-stats span { font-size: 11px; color: var(--muted); font-weight: 700; }
  .ig-bio { font-size: 13px; color: rgba(246,246,249,.82); line-height: 1.55; padding: 0 2px 16px; }
  .ig-bio b { color: var(--text); font-weight: 800; }

  /* segmented control */
  .seg { display: flex; border: 1px solid var(--line); border-radius: 14px; overflow: hidden;
    margin: 0 0 18px; background: var(--card); padding: 4px; gap: 4px; }
  .seg button { flex: 1; padding: 10px 4px; background: none; border: 0; cursor: pointer; font-family: inherit;
    color: var(--muted); font-size: 12.5px; font-weight: 800; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; gap: 5px; transition: background .18s, color .18s; }
  .seg button.on { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff;
    box-shadow: 0 4px 14px rgba(255,61,119,.3); }

  /* boutique shelves */
  .shelf { margin-bottom: 22px; }
  .shelf-title { display: flex; align-items: center; gap: 8px; font-weight: 900; font-size: 14.5px; margin: 0 2px 12px; }
  .shelf-title .cnt { color: var(--muted); font-size: 12px; font-weight: 700; }
  .shelf-row { display: flex; gap: 12px; overflow-x: auto; padding: 4px 2px 0; scrollbar-width: none; }
  .shelf-row::-webkit-scrollbar { display: none; }
  /* physical wooden ledge the products sit on */
  .shelf-ledge { height: 12px; border-radius: 3px; margin: 0 2px;
    background: linear-gradient(180deg, #7a5636 0%, #5a3e26 45%, #3a2716 100%);
    box-shadow: 0 8px 18px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.18), inset 0 -2px 4px rgba(0,0,0,.4); }

  /* product tile — clean "cutout" retail look on a light surface */
  .ptile { flex-shrink: 0; width: 122px; background: #fbfbfd; border-radius: 16px; padding: 11px;
    cursor: pointer; display: flex; flex-direction: column;
    box-shadow: 0 8px 18px rgba(0,0,0,.32); transition: transform .15s; }
  .ptile:active { transform: scale(.97); }
  .ptile .pimg { height: 88px; display: flex; align-items: center; justify-content: center; font-size: 54px;
    filter: drop-shadow(0 8px 7px rgba(0,0,0,.22)); }
  .ptile .pname { color: #14141a; font-size: 12.5px; font-weight: 800; line-height: 1.25; margin-top: 8px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ptile .pbrand { color: #9a9aa5; font-size: 10px; font-weight: 700; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ptile .pprice { color: #14141a; font-size: 14px; font-weight: 900; margin-top: 5px; font-family: "Poppins", sans-serif; }
  .ptile .pacts { display: flex; gap: 6px; margin-top: 10px; }
  .ptile .pbuy, .ptile .psell { flex: 1; border: 0; border-radius: 9px; padding: 7px 0; font-size: 11px;
    font-weight: 800; cursor: pointer; font-family: inherit; transition: filter .15s; }
  .ptile .pbuy { color: #fff; background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .ptile .psell { color: #3a3a44; background: #ececf2; }
  .ptile .pbuy:active, .ptile .psell:active { filter: brightness(.92); }

  /* looks grid (Instagram tiles) */
  .looks-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
  .look-cell { position: relative; aspect-ratio: 3 / 4; border-radius: 10px; overflow: hidden; cursor: pointer;
    background: linear-gradient(160deg, #a18cd1, #fbc2eb); transition: transform .15s; }
  .look-cell:active { transform: scale(.97); }
  .look-cell img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .look-cell .lc-meta { position: absolute; inset: auto 0 0 0; padding: 16px 8px 7px; font-size: 10.5px;
    font-weight: 800; color: #fff; background: linear-gradient(0deg, rgba(0,0,0,.72), transparent); }

  input[type=file] { display: none; }
</style>
</head>
<body>
<div class="phone">
  <header>
    <div class="logo">AWEAR<span class="pin">· תל אביב</span></div>
    <div class="ava"></div>
  </header>

  <main>
    <!-- CLOSET -->
    <section id="closet" class="view active">
      <div id="closet-body">
        <div class="hint">
          <div class="big">👗</div>
          <h2>הארון הדיגיטלי שלך</h2>
          <p>צלמי את התלבושת של היום<br/>וה-AI יזהה כל פריט, יתמחר אותו<br/>ויהפוך אותו לניתן לקנייה ומכירה.</p>
          <div class="cta">לחצי על ➕ למטה כדי להתחיל</div>
        </div>
      </div>
    </section>

    <!-- FEED — TikTok-style immersive vertical scroll (cards built in JS) -->
    <section id="feed" class="view">
      <div class="feed-h">בשבילך · For You</div>
      <!-- newest user looks first, then seed creators — all rendered by renderFeed() -->
      <div id="feed-scroll"></div>
    </section>

  </main>

  <nav>
    <button data-view="closet" class="active"><span class="ico">👤</span>הפרופיל שלי</button>
    <button class="fab" id="capture-btn">＋</button>
    <button data-view="feed"><span class="ico">▶️</span>פיד</button>
  </nav>

  <input type="file" id="file-input" accept="image/*" capture="environment" />

  <div id="purchase-modal" class="modal-overlay">
    <div class="modal-card" id="modal-card"></div>
  </div>
</div>

<script>
  const fileInput = document.getElementById('file-input');
  const closetBody = document.getElementById('closet-body');
  const modal = document.getElementById('purchase-modal');
  const modalCard = document.getElementById('modal-card');

  const EMOJI = { top:'👕', bottoms:'👖', dress:'👗', outerwear:'🧥', shoes:'👟',
                  bag:'👜', accessory:'🕶️', jewelry:'💍', hat:'🧢' };
  function emojiFor(cat) { return EMOJI[(cat||'').toLowerCase()] || '🧷'; }
  function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }
  function attr(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

  // ---- tabs ----
  document.querySelectorAll('nav button[data-view]').forEach(b => {
    b.addEventListener('click', () => showView(b.dataset.view));
  });
  function showView(name) {
    document.querySelectorAll('nav button[data-view]').forEach(x => x.classList.toggle('active', x.dataset.view === name));
    document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === name));
    const mainEl = document.querySelector('main');
    mainEl.classList.toggle('feed-mode', name === 'feed');
    if (name === 'closet') renderCloset();
    if (name === 'feed') {
      renderFeed();
      // size each card to the live viewport so one look fills the screen (snap)
      requestAnimationFrame(() => {
        mainEl.style.setProperty('--feed-h', mainEl.clientHeight + 'px');
        mainEl.scrollTop = 0;
      });
    }
  }

  document.getElementById('capture-btn').addEventListener('click', () => {
    profileTab = 'closet';  // land on the closet shelves to see the new items
    showView('closet');
    fileInput.click();
  });

  // ---- simulated in-app purchase (dropshipping shown as if it already works) ----
  function buyFlow(label, price) {
    modal.classList.add('show');
    modalCard.innerHTML = '<div class="spinner"></div><h3>רוכשת את ' + esc(label) + '…</h3><p>Awear מבצעת את ההזמנה מהמותג עבורך</p>';
    setTimeout(() => {
      modalCard.innerHTML =
        '<div class="big">✅</div><h3>ההזמנה אושרה!</h3>' +
        '<p>' + esc(label) + ' בדרך אליך · שולם ₪' + esc(price) + '<br/>משלוח עד הבית תוך 3-5 ימים 📦</p>' +
        '<button class="close">מעולה</button>';
      modalCard.querySelector('.close').addEventListener('click', () => modal.classList.remove('show'));
    }, 1300);
  }
  function sellFlow(label, price, cat) {
    modal.classList.add('show');
    modalCard.innerHTML = '<div class="spinner"></div><h3>מפרסמת את ' + esc(label) + ' למכירה…</h3><p>ה-AI מתמחר לפי ביקוש בשוק היד-שנייה</p>';
    setTimeout(() => {
      addListing({ name: label, price: Number(price) || 0, category: cat || '' });
      modalCard.innerHTML =
        '<div class="big">💸</div><h3>פורסם למכירה!</h3>' +
        '<p>' + esc(label) + ' עכשיו במדף המכירה בפרופיל שלך<br/>מחיר מומלץ: ₪' + esc(price) + ' · עמלת Awear 15%</p>' +
        '<button class="close">לפרופיל</button>';
      modalCard.querySelector('.close').addEventListener('click', () => { modal.classList.remove('show'); showView('profile'); });
    }, 1300);
  }
  // delegate buy + sell clicks across closet + feed
  document.querySelector('main').addEventListener('click', (e) => {
    const buyBtn = e.target.closest('[data-buy]');
    if (buyBtn) { buyFlow(buyBtn.dataset.label, buyBtn.dataset.price); return; }
    const sellBtn = e.target.closest('[data-sell]');
    if (sellBtn) sellFlow(sellBtn.dataset.label, sellBtn.dataset.price, sellBtn.dataset.cat);
  });

  // ---- analyze flow ----
  // read an image File into a dataURL so the latest look's photo can be reused in the feed
  function readDataURL(file) {
    return new Promise((resolve) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = () => resolve(null);
      r.readAsDataURL(file);
    });
  }

  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0];
    if (!file) return;
    closetBody.innerHTML = '<div class="loading"><div class="spinner"></div><p>ה-AI מזהה את הפריטים שלך…</p></div>';

    // capture the photo as a dataURL in parallel with the upload
    const photoPromise = readDataURL(file);

    const fd = new FormData();
    fd.append('photo', file);

    // ~30s AbortController timeout so the spinner never hangs on a stuck request
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 30000);
    try {
      const res = await fetch('/api/analyze', { method: 'POST', body: fd, signal: controller.signal });
      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.detail || ('שגיאה ' + res.status));
      }
      const data = await res.json();
      data.photo = await photoPromise;  // attach captured look image for the feed
      addScan(data);
    } catch (err) {
      const msg = err.name === 'AbortError' ? 'הבקשה ארכה יותר מדי — נסי שוב' : err.message;
      closetBody.innerHTML = '<div class="err">⚠️ ' + esc(msg) + '</div>';
    } finally {
      clearTimeout(timer);
    }
    fileInput.value = '';
  });

  // ---- persistence (localStorage) ----
  const WARDROBE_KEY = 'awear_wardrobe';
  const META_KEY = 'awear_meta';
  const SHELF_KEY = 'awear_shelf';
  const FEED_KEY = 'awear_feed';
  const LASTSCAN_KEY = 'awear_lastscan';

  function loadFeed() {
    try { return JSON.parse(localStorage.getItem(FEED_KEY)) || []; }
    catch (e) { return []; }
  }
  function saveFeed(posts) { localStorage.setItem(FEED_KEY, JSON.stringify(posts)); }
  function loadLastScan() {
    try { return JSON.parse(localStorage.getItem(LASTSCAN_KEY)) || null; }
    catch (e) { return null; }
  }
  function saveLastScan(scan) {
    try { localStorage.setItem(LASTSCAN_KEY, JSON.stringify(scan)); }
    catch (e) { /* dataURL may exceed quota — degrade to gradient fallback */ }
  }

  function loadShelf() {
    try { return JSON.parse(localStorage.getItem(SHELF_KEY)) || []; }
    catch (e) { return []; }
  }
  function saveShelf(items) { localStorage.setItem(SHELF_KEY, JSON.stringify(items)); }
  function addListing(it) {
    const shelf = loadShelf();
    shelf.unshift({ name: it.name, price: it.price, category: it.category, ts: Date.now() });
    saveShelf(shelf);
  }
  function removeListing(ts) {
    saveShelf(loadShelf().filter(x => x.ts !== ts));
    renderCloset();
  }

  function loadWardrobe() {
    try { return JSON.parse(localStorage.getItem(WARDROBE_KEY)) || []; }
    catch (e) { return []; }
  }
  function saveWardrobe(items) { localStorage.setItem(WARDROBE_KEY, JSON.stringify(items)); }
  function loadMeta() {
    try { return JSON.parse(localStorage.getItem(META_KEY)) || null; }
    catch (e) { return null; }
  }
  function saveMeta(meta) { localStorage.setItem(META_KEY, JSON.stringify(meta)); }
  function resetWardrobe() {
    localStorage.removeItem(WARDROBE_KEY);
    localStorage.removeItem(META_KEY);
    localStorage.removeItem(SHELF_KEY);
    localStorage.removeItem(FEED_KEY);
    localStorage.removeItem(LASTSCAN_KEY);
    renderCloset();
    renderFeed();
  }

  // ---- render the full accumulated closet from storage ----
  // closet shelves: which categories sit on which "shelf / drawer"
  const SHELF_GROUPS = [
    { cats: ['top'],                       title: 'מדף עליוניות', icon: '👕' },
    { cats: ['dress'],                     title: 'מדף שמלות',    icon: '👗' },
    { cats: ['bottoms'],                   title: 'מדף מכנסיים',  icon: '👖' },
    { cats: ['outerwear'],                 title: 'מדף מעילים',   icon: '🧥' },
    { cats: ['shoes'],                     title: 'ארון נעליים',  icon: '👟' },
    { cats: ['bag'],                       title: 'מדף תיקים',    icon: '👜' },
    { cats: ['accessory', 'jewelry', 'hat'], title: 'מגירת אקססוריז', icon: '🕶️' },
  ];
  let profileTab = 'closet';  // closet | looks | forsale

  // a single product, shown "cutout" style on a light tile like a retail site
  function productTile(it) {
    return `
      <div class="ptile">
        <div class="pimg">${emojiFor(it.category)}</div>
        <div class="pname">${esc(it.name)}</div>
        <div class="pbrand">${esc(it.brand_vibe || '')}</div>
        <div class="pprice">₪${esc(it.price_estimate_ils)}</div>
        <div class="pacts">
          <button class="pbuy" data-buy="1" data-label="${attr(it.name)}" data-price="${attr(it.price_estimate_ils)}">קני</button>
          <button class="psell" data-sell="1" data-cat="${attr(it.category)}" data-label="${attr(it.name)}" data-price="${Math.round((it.price_estimate_ils || 0) * 0.5)}">מכרי</button>
        </div>
      </div>`;
  }

  function closetShelvesHTML(wardrobe) {
    if (!wardrobe.length) {
      return `<div class="hint" style="padding:56px 26px">
        <div class="big">🚪</div><h2>הארון שלך עוד ריק</h2>
        <p>צלמי תלבושת וה-AI יסדר כל פריט<br/>על המדף הנכון בארון שלך.</p>
        <div class="cta">לחצי על ➕ למטה כדי להתחיל</div></div>`;
    }
    const byCat = {};
    wardrobe.forEach(it => { const c = (it.category || '').toLowerCase(); (byCat[c] = byCat[c] || []).push(it); });
    const known = new Set();
    SHELF_GROUPS.forEach(g => g.cats.forEach(c => known.add(c)));
    let html = '';
    const shelf = (icon, title, items) => `
      <div class="shelf">
        <div class="shelf-title">${icon} ${esc(title)} <span class="cnt">· ${items.length}</span></div>
        <div class="shelf-row">${items.map(productTile).join('')}</div>
        <div class="shelf-ledge"></div>
      </div>`;
    SHELF_GROUPS.forEach(g => {
      const items = g.cats.flatMap(c => byCat[c] || []);
      if (items.length) html += shelf(g.icon, g.title, items);
    });
    const others = wardrobe.filter(it => !known.has((it.category || '').toLowerCase()));
    if (others.length) html += shelf('🧷', 'שונות', others);
    return html;
  }

  function looksGridHTML() {
    const feed = loadFeed();
    if (!feed.length) return `<div class="shelf-empty"><div class="big">📸</div>עדיין לא שיתפת לוקים.<br/>צלמי תלבושת ושתפי אותה לפיד<br/>כדי שתופיע כאן בפרופיל שלך.</div>`;
    return `<div class="looks-grid">${feed.map(p => {
      const bg = p.photo ? `<img src="${attr(p.photo)}" alt="">` : '';
      return `<div class="look-cell" data-goto-feed="1">${bg}<div class="lc-meta">${esc(p.item_count || 0)} פריטים${p.look_total_ils ? ' · ₪' + esc(p.look_total_ils) : ''}</div></div>`;
    }).join('')}</div>`;
  }

  function forSaleHTML() {
    const shelf = loadShelf();
    const shelfTotal = shelf.reduce((s, it) => s + (Number(it.price) || 0), 0);
    const earnings = Math.round(shelfTotal * 0.85);  // Awear takes 15%
    const earnCard = shelf.length ? `
      <div class="earn">
        <div class="top"><span class="big-num">₪${earnings.toLocaleString()}</span><span class="ttl">פוטנציאל רווח</span></div>
        <p>${shelf.length} פריטים במכירה · שווי ₪${shelfTotal.toLocaleString()} · נטו אחרי עמלת Awear 15%</p>
      </div>` : '';
    const listings = shelf.length
      ? shelf.map(it => `
        <div class="listing">
          <div class="ic">${emojiFor(it.category)}</div>
          <div class="info"><div class="nm">${esc(it.name)}</div><div class="sub">מתומחר ע"י AI לפי ביקוש בשוק היד-שנייה</div></div>
          <div class="ask"><div class="p">₪${esc(it.price)}</div><div class="live">פעיל</div></div>
          <button class="rm" data-rm="${attr(it.ts)}" title="הסר">×</button>
        </div>`).join('')
      : `<div class="shelf-empty"><div class="big">💸</div>עדיין לא העלית פריטים למכירה.<br/>פתחי את הארון ולחצי "מכרי" על פריט.</div>`;
    return earnCard + listings;
  }

  // PROFILE = CLOSET: one Instagram-style screen — identity + shelves / looks / for-sale
  function renderCloset() {
    const wardrobe = loadWardrobe();
    const meta = loadMeta() || {};
    const feed = loadFeed();
    const closetValue = wardrobe.reduce((s, it) => s + (Number(it.price_estimate_ils) || 0), 0);

    let body;
    if (profileTab === 'looks') body = looksGridHTML();
    else if (profileTab === 'forsale') body = forSaleHTML();
    else body = `
      ${meta.stylist_tip ? `<div class="stylist"><div class="stylist-h">✨ סטייליסט AI · מה ללבוש</div><p>${esc(meta.stylist_tip)}</p></div>` : ''}
      ${meta.look_total_ils != null ? `<button class="shop-look" data-buy="1" data-label="הלוק האחרון" data-price="${attr(meta.look_total_ils)}">🛍️ קני את הלוק האחרון · ~₪${esc(meta.look_total_ils)}</button>` : ''}
      ${wardrobe.length ? `<button class="shop-look share-look" id="share-look">📲 שתפי את הלוק לפיד</button>` : ''}
      ${closetShelvesHTML(wardrobe)}`;

    closetBody.innerHTML = `
      <div class="ig-head">
        <div class="ig-ava"></div>
        <div class="ig-id">
          <div class="ig-name">הסטייל שלי</div>
          <div class="ig-handle">@me · תל אביב</div>
          <span class="ig-edit" id="reset-link">איפוס ארון</span>
        </div>
      </div>
      <div class="ig-stats">
        <div><b>${feed.length}</b><span>לוקים</span></div>
        <div><b>1.2K</b><span>עוקבים</span></div>
        <div><b>340</b><span>עוקבת</span></div>
        <div><b>🔥${meta.trend_score != null ? esc(meta.trend_score) : '—'}</b><span>טרנדיות</span></div>
      </div>
      <div class="ig-bio"><b>${wardrobe.length} פריטים</b> בארון · שווי ~₪${closetValue.toLocaleString()}${meta.overall_style ? ' · ' + esc(meta.overall_style) : ''}</div>
      <div class="seg">
        <button data-seg="closet" class="${profileTab === 'closet' ? 'on' : ''}">🚪 הארון</button>
        <button data-seg="looks" class="${profileTab === 'looks' ? 'on' : ''}">📸 לוקים</button>
        <button data-seg="forsale" class="${profileTab === 'forsale' ? 'on' : ''}">💸 למכירה</button>
      </div>
      ${body}`;

    const resetLink = document.getElementById('reset-link');
    if (resetLink) resetLink.addEventListener('click', resetWardrobe);
    const shareBtn = document.getElementById('share-look');
    if (shareBtn) shareBtn.addEventListener('click', shareLookToFeed);
    closetBody.querySelectorAll('[data-seg]').forEach(b =>
      b.addEventListener('click', () => { profileTab = b.dataset.seg; renderCloset(); }));
    closetBody.querySelectorAll('[data-rm]').forEach(btn =>
      btn.addEventListener('click', () => removeListing(Number(btn.dataset.rm))));
    closetBody.querySelectorAll('[data-goto-feed]').forEach(cell =>
      cell.addEventListener('click', () => showView('feed')));
  }

  // ---- append a new scan to the wardrobe, persist, re-render ----
  function addScan(data) {
    const newItems = data.items || [];
    const wardrobe = newItems.concat(loadWardrobe());  // newest-first
    saveWardrobe(wardrobe);
    const meta = {
      overall_style: data.overall_style,
      occasion: data.occasion,
      trend_score: data.trend_score,
      summary: data.summary,
      stylist_tip: data.stylist_tip,
      look_total_ils: data.look_total_ils,
    };
    saveMeta(meta);
    // remember the latest look (photo + items + meta) so it can be shared to the feed
    saveLastScan({ photo: data.photo || null, items: newItems, meta: meta });
    renderCloset();
    if (newItems.length) showToast('נוספו ' + newItems.length + ' פריטים לארון ✨');
  }

  // ---- closet → feed value loop ----
  // build the union of style tags + categories across the user's wardrobe
  function wardrobeTagSet() {
    const set = new Set();
    loadWardrobe().forEach(it => {
      (it.style_tags || []).forEach(t => set.add(String(t).toLowerCase()));
      if (it.category) set.add(String(it.category).toLowerCase());
    });
    return set;
  }

  // REAL "% match to your closet": overlap between a card's tags and the wardrobe,
  // mapped into a sensible 60–98% range. Empty wardrobe → a neutral default.
  function matchPercent(cardTags) {
    const userSet = wardrobeTagSet();
    if (!userSet.size) return 72;  // sensible default before any scan
    const tags = (cardTags || []).map(t => String(t).toLowerCase()).filter(Boolean);
    if (!tags.length) return 72;
    let hits = 0;
    tags.forEach(t => { if (userSet.has(t)) hits++; });
    const ratio = hits / tags.length;             // 0..1 overlap
    return Math.round(60 + ratio * 38);           // → 60..98%
  }

  // share the latest scanned look as a persisted feed post, then jump to the feed
  function shareLookToFeed() {
    const scan = loadLastScan();
    if (!scan) { showToast('צלמי לוק קודם כדי לשתף 📸'); return; }
    const meta = scan.meta || {};
    const post = {
      ts: Date.now(),
      photo: scan.photo || null,
      caption: meta.overall_style || 'הלוק שלי',
      occasion: meta.occasion || '',
      item_count: (scan.items || []).length,
      look_total_ils: meta.look_total_ils || 0,
      tags: (scan.items || []).reduce((acc, it) => {
        (it.style_tags || []).forEach(t => acc.push(t));
        if (it.category) acc.push(it.category);
        return acc;
      }, []),
    };
    const feed = loadFeed();
    feed.unshift(post);  // newest-first
    saveFeed(feed);
    renderFeed();
    showToast('הלוק שותף לפיד ✨');
    showView('feed');
  }

  // ---- TikTok-style feed: one renderer for both the user's looks and seed creators ----
  const LIKES_KEY = 'awear_likes';
  const SAVED_KEY = 'awear_saved';
  function loadSet(k) { try { return new Set(JSON.parse(localStorage.getItem(k)) || []); } catch (e) { return new Set(); } }
  function saveSet(k, s) { localStorage.setItem(k, JSON.stringify([...s])); }
  let LIKES = loadSet(LIKES_KEY);
  let SAVED = loadSet(SAVED_KEY);

  // seed creators — fixed demo content the feed always shows under the user's looks
  const SEED_POSTS = [
    { id:'s1', user:'@noa.styles',  g:'g1', img:'/static/feed/1.jpg', cap:'לוק קיצי לבית קפה ☕️ #y2k #telaviv', price:149, buyLabel:'הלוק של נועה', likes:2400, comments:88,  tags:['y2k','casual','minimal','top','dress'] },
    { id:'s2', user:'@yael_fits',   g:'g2', img:'/static/feed/2.jpg', cap:'סטריטוור עכשווי ✨ #streetwear',     price:219, buyLabel:'הלוק של יעל',  likes:5100, comments:203, tags:['streetwear','utility','bottoms','sneakers','shoes'] },
    { id:'s3', user:'@mika.thrift', g:'g3', img:'/static/feed/3.jpg', cap:'יד שנייה במצב מעולה ♻️ #secondhand', price:89,  buyLabel:'לוק יד שנייה', secondhand:true, likes:1800, comments:64, tags:['secondhand','vintage','everyday','top','bag'] },
    { id:'s4', user:'@shir.daily',  g:'g4', img:'/static/feed/4.jpg', cap:'אאוטפיט ליום ראשון 🤍 #ootd',         price:179, buyLabel:'הלוק של שיר', likes:3300, comments:121, tags:['minimal','everyday','ootd','dress','shoes'] },
    { id:'s5', user:'@agam.x',      g:'g5', img:'/static/feed/5.jpg', cap:'vintage vibes 🕶️ #thrifted #vintage', price:259, buyLabel:'הלוק של אגם', likes:4000, comments:156, tags:['vintage','retro','thrifted','accessory','outerwear'] },
  ];

  function fmtCount(n) { return n >= 1000 ? (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/, '') + 'K' : '' + n; }

  // the user's shared looks, mapped into the same post shape as the seeds
  function minePosts() {
    return loadFeed().map(p => ({
      id: 'm' + p.ts, mine: true, user: '@you · אני', img: p.photo || null, g: 'g2',
      cap: (p.caption || 'הלוק שלי') + (p.occasion ? ' · ' + p.occasion : '') + ' · ' + (p.item_count || 0) + ' פריטים',
      price: p.look_total_ils || 0, buyLabel: 'הלוק שלי', likes: 0, comments: 0, tags: p.tags || [],
    }));
  }

  function feedCardHTML(p) {
    const liked = LIKES.has(p.id);
    const saved = SAVED.has(p.id);
    const likeCount = (p.likes || 0) + (liked ? 1 : 0);
    const bg = `<div class="bg ${p.g || 'g2'}"></div>` +
      (p.img ? `<img class="feed-img" src="${attr(p.img)}" alt="" onerror="this.remove()">` : '');
    const badge = p.mine
      ? `<span class="mine-tag">✨ אני</span>`
      : `<span class="match-badge">${matchPercent(p.tags)}% התאמה לארון</span>`;
    const buyTxt = p.secondhand ? '♻️ קני יד שנייה' : '🛍️ Shop the Look';
    return `
      <div class="feed-card${p.mine ? ' mine' : ''}" data-id="${attr(p.id)}">
        ${bg}
        ${badge}
        <div class="heart-burst">❤️</div>
        <div class="rail">
          <button class="act like${liked ? ' on' : ''}" data-like="${attr(p.id)}" data-base="${p.likes || 0}">
            <span class="ic">${liked ? '❤️' : '🤍'}</span><span class="lbl">${fmtCount(likeCount) || 'אהבתי'}</span>
          </button>
          <button class="act" data-comment="${attr(p.id)}">
            <span class="ic">💬</span><span class="lbl">${p.comments ? fmtCount(p.comments) : 'תגובה'}</span>
          </button>
          <button class="act save${saved ? ' saved' : ''}" data-save="${attr(p.id)}">
            <span class="ic">${saved ? '🔖' : '➕'}</span><span class="lbl">${saved ? 'נשמר' : 'שמירה'}</span>
          </button>
          <button class="act" data-share="${attr(p.id)}">
            <span class="ic">↗️</span><span class="lbl">שיתוף</span>
          </button>
        </div>
        <div class="overlay">
          <div class="user"><div class="dot"></div>${esc(p.user)}</div>
          <div class="cap">${esc(p.cap)}</div>
          ${p.price ? `<button class="buy-look" data-buy="1" data-label="${attr(p.buyLabel)}" data-price="${attr(p.price)}">${buyTxt} · ₪${esc(p.price)}</button>` : ''}
        </div>
      </div>`;
  }

  function renderFeed() {
    const host = document.getElementById('feed-scroll');
    if (!host) return;
    LIKES = loadSet(LIKES_KEY);
    SAVED = loadSet(SAVED_KEY);
    host.innerHTML = minePosts().concat(SEED_POSTS).map(feedCardHTML).join('');
  }

  // ---- feed interactions: like / save / comment / share + double-tap to like ----
  function refreshLikeBtn(btn, id) {
    const liked = LIKES.has(id);
    const base = Number(btn.dataset.base) || 0;
    btn.classList.toggle('on', liked);
    btn.querySelector('.ic').textContent = liked ? '❤️' : '🤍';
    btn.querySelector('.lbl').textContent = fmtCount(base + (liked ? 1 : 0)) || 'אהבתי';
  }
  function setLike(id, on, btn) {
    if (on) LIKES.add(id); else LIKES.delete(id);
    saveSet(LIKES_KEY, LIKES);
    if (btn) refreshLikeBtn(btn, id);
  }
  function burstHeart(card) {
    const h = card.querySelector('.heart-burst');
    if (!h) return;
    h.classList.remove('go'); void h.offsetWidth; h.classList.add('go');
  }

  const feedScroll = document.getElementById('feed-scroll');
  if (feedScroll) {
    feedScroll.addEventListener('click', (e) => {
      const likeBtn = e.target.closest('[data-like]');
      if (likeBtn) { setLike(likeBtn.dataset.like, !LIKES.has(likeBtn.dataset.like), likeBtn); return; }
      const saveBtn = e.target.closest('[data-save]');
      if (saveBtn) {
        const id = saveBtn.dataset.save, on = !SAVED.has(id);
        if (on) SAVED.add(id); else SAVED.delete(id);
        saveSet(SAVED_KEY, SAVED);
        saveBtn.classList.toggle('saved', on);
        saveBtn.querySelector('.ic').textContent = on ? '🔖' : '➕';
        saveBtn.querySelector('.lbl').textContent = on ? 'נשמר' : 'שמירה';
        showToast(on ? 'נשמר לרשימת המשאלות 🔖' : 'הוסר מהשמורים');
        return;
      }
      if (e.target.closest('[data-comment]')) { showToast('תגובות בקרוב 💬'); return; }
      if (e.target.closest('[data-share]')) { showToast('הקישור הועתק — שתפי בסטורי ↗️'); return; }
    });

    // double-tap anywhere on a card => like + heart burst (TikTok gesture)
    let lastTap = 0, lastCard = null;
    feedScroll.addEventListener('pointerup', (e) => {
      if (e.target.closest('button')) return;  // taps on controls handled above
      const card = e.target.closest('.feed-card');
      if (!card) return;
      const now = Date.now();
      if (now - lastTap < 320 && lastCard === card) {
        const id = card.dataset.id;
        setLike(id, true, card.querySelector('[data-like]'));
        burstHeart(card);
        lastTap = 0;
      } else {
        lastTap = now; lastCard = card;
      }
    });
  }

  // ---- toast ----
  function showToast(msg) {
    let t = document.getElementById('toast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'toast';
      t.className = 'toast';
      document.querySelector('.phone').appendChild(t);
    }
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(() => t.classList.remove('show'), 2400);
  }

  // ---- render persisted wardrobe + feed on load ----
  renderCloset();
  renderFeed();
</script>
</body>
</html>

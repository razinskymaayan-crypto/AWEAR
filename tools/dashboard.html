<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>AWEAR — Company Dashboard</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
  :root{
    --bg:#0a0a0e; --card:#17171f; --card-hover:#1f1f38; --line:#24242e;
    --accent:#ff3d77; --accent2:#7b5cff; --fg:#f6f6f9; --muted:#8e8e9c;
    --success:#4ade80; --warning:#fbbf24; --danger:#ef4444;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:'Inter',system-ui,-apple-system,sans-serif;padding:32px;}
  h1{font-size:24px;font-weight:900;margin:0 0 4px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:28px}
  .totals{display:flex;gap:16px;margin-bottom:32px;flex-wrap:wrap}
  .tcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 20px;min-width:150px}
  .tcard .num{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .tcard .label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
  .dept{margin-bottom:28px}
  .dept h2{font-size:14px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:0 0 12px;padding-bottom:8px;border-bottom:1px solid var(--line)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
  .acard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;transition:border-color .15s}
  .acard:hover{border-color:var(--accent2)}
  .acard.zero{opacity:.55}
  .ahead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .aname{font-size:15px;font-weight:800}
  .badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.4px}
  .badge.idle{background:rgba(142,142,156,.15);color:var(--muted)}
  .badge.running{background:rgba(74,222,128,.15);color:var(--success);animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .arow{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:6px}
  .arow b{color:var(--fg);font-weight:700}
  .bar{height:5px;border-radius:3px;background:var(--line);margin-top:10px;overflow:hidden}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .3s}
  .current{margin-top:10px;font-size:11px;color:var(--success);background:rgba(74,222,128,.08);border-radius:8px;padding:6px 8px;line-height:1.4}
  .last{font-size:10px;color:var(--muted);margin-top:8px}
  details{margin-top:8px}
  summary{font-size:11px;color:var(--accent2);cursor:pointer;font-weight:700}
  .task{font-size:11px;color:var(--muted);padding:6px 0;border-bottom:1px solid var(--line)}
  .task b{color:var(--fg)}
  .unattr{font-size:11px;color:var(--warning);margin-top:24px}
  footer{margin-top:32px;color:var(--muted);font-size:11px}

  .tabs{display:flex;gap:8px;margin-bottom:24px}
  .tab{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 18px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s}
  .tab.active{color:var(--fg);border-color:var(--accent2);background:var(--card-hover)}
  .view{display:none}
  .view.active{display:block}
  #graph{height:640px;background:var(--card);border:1px solid var(--line);border-radius:16px}
  .legend{display:flex;gap:18px;margin-top:12px;font-size:11px;color:var(--muted);flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
</style>
</head>
<body>
  <h1>AWEAR — Company Dashboard</h1>
  <div class="sub" id="updated">טוען...</div>
  <div class="totals" id="totals"></div>

  <div class="tabs">
    <div class="tab active" data-view="cards">כרטיסים</div>
    <div class="tab" data-view="graph">מפת קשרים</div>
  </div>

  <div class="view active" id="view-cards">
    <div id="depts"></div>
    <div class="unattr" id="unattr"></div>
  </div>

  <div class="view" id="view-graph">
    <div id="graph"></div>
    <div class="legend">
      <span><span class="dot" style="background:#7b5cff"></span>דירקטוריון/CEO</span>
      <span><span class="dot" style="background:#06b6d4"></span>ראש צוות</span>
      <span><span class="dot" style="background:#8e8e9c"></span>IC — לא פעיל</span>
      <span><span class="dot" style="background:#4ade80"></span>IC — עובד כרגע</span>
      <span>קו רציף = היררכיה · קו מקווקו = peer review · גודל עיגול = נפח טוקנים</span>
    </div>
  </div>

  <footer>מתעדכן אוטומטית כל 5 שניות · המספרים נשלפים מתוך session transcripts אמיתיים — לא מוערכים</footer>

<script>
const DEPT_LABELS = {design:'Design', mobile:'Mobile', backend:'Backend', product:'Product', unknown:'לא ידוע'};
const NAME_LABELS = {shira:'שירה', ayalon:'איילון', dolce:'דולצ\'ה', gabbana:'גבאנה', netta:'נטה', mark:'מארק',
  dana:'דנה', roei:'רועי', varan:'וראן', sam:'סאם', oren:'אורן', steve:'סטיב'};

function fmtNum(n){ return n.toLocaleString('en-US'); }
function fmtAgo(iso){
  if(!iso) return 'אין נתון';
  const d = new Date(iso); const diff = (Date.now()-d.getTime())/1000;
  if(diff<60) return 'עכשיו';
  if(diff<3600) return Math.floor(diff/60)+' דק׳';
  if(diff<86400) return Math.floor(diff/3600)+' שעות';
  return Math.floor(diff/86400)+' ימים';
}

let network = null;

function buildGraph(data){
  const nodes = [];
  const edges = [];
  const KIND_COLOR = {board:'#7b5cff', ceo:'#7b5cff', head:'#06b6d4'};

  const maxTokens = Math.max(1, ...Object.values(data.agents).map(a=>a.total_tokens));
  // fixed tiers, not inferred -- the "peer" (dashed) edges otherwise confuse
  // vis-network's automatic level detection (it treats them as hierarchy too).
  const LEVEL = {board:0, ceo:1, head:2, ic:3};

  for(const [id, n] of Object.entries(data.org_nodes)){
    let color = KIND_COLOR[n.kind];
    let size = 22;
    let borderWidth = 2;
    if(n.kind === 'ic'){
      const a = data.agents[id];
      const tokens = a ? a.total_tokens : 0;
      size = 16 + Math.round(22 * (tokens/maxTokens));
      color = a && a.status === 'running' ? '#4ade80' : (tokens>0 ? '#ff3d77' : '#3a3a45');
      borderWidth = a && a.status === 'running' ? 4 : 1;
    }
    nodes.push({
      id, label: n.label, level: LEVEL[n.kind],
      shape:'dot', size, borderWidth,
      color:{background:color, border: n.kind==='ic' ? '#fff':color, highlight:{background:color,border:'#fff'}},
      font:{color:'#f6f6f9', size:13, face:'Inter'},
    });
  }
  for(const [from, to, kind] of data.org_edges){
    edges.push({
      from, to,
      dashes: kind === 'peer',
      color: kind === 'peer' ? '#7b5cff' : '#3a3a45',
      width: kind === 'peer' ? 1.5 : 2,
      arrows: kind === 'peer' ? '' : 'to',
      smooth: kind === 'peer' ? {type:'curvedCW', roundness:0.3} : false,
    });
  }

  const container = document.getElementById('graph');
  const options = {
    layout:{hierarchical:{enabled:true, direction:'UD', sortMethod:'directed', levelSeparation:130, nodeSpacing:100}},
    physics:{enabled:false},
    interaction:{hover:true, zoomView:true, dragView:true},
  };
  if(!network){
    network = new vis.Network(container, {nodes:new vis.DataSet(nodes), edges:new vis.DataSet(edges)}, options);
    network.once('afterDrawing', () => network.fit({animation:false}));
  } else {
    network.setData({nodes:new vis.DataSet(nodes), edges:new vis.DataSet(edges)});
    network.fit({animation:false});
  }
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('view-'+tab.dataset.view).classList.add('active');
    if(tab.dataset.view === 'graph' && network){
      network.redraw();
      network.fit({animation:false});
    }
  });
});

let lastData = null;
async function refresh(){
  const res = await fetch('/api/data');
  const data = await res.json();
  lastData = data;
  document.getElementById('updated').textContent = 'עודכן: ' + new Date(data.generated_at).toLocaleString('he-IL');

  const t = data.company_totals;
  document.getElementById('totals').innerHTML = `
    <div class="tcard"><div class="num">${fmtNum(t.total_dispatches)}</div><div class="label">משימות שוגרו</div></div>
    <div class="tcard"><div class="num">${fmtNum(t.total_tokens)}</div><div class="label">טוקנים נצרכו</div></div>
    <div class="tcard"><div class="num">${fmtNum(t.total_tool_uses)}</div><div class="label">קריאות כלים</div></div>
  `;

  const maxTokens = Math.max(1, ...Object.values(data.agents).map(a=>a.total_tokens));
  const byDept = {};
  for(const [name, a] of Object.entries(data.agents)){
    (byDept[a.department] = byDept[a.department]||[]).push([name, a]);
  }

  let html = '';
  for(const dept of ['design','mobile','backend','product']){
    const agents = (byDept[dept]||[]).sort((a,b)=>b[1].total_tokens-a[1].total_tokens);
    if(!agents.length) continue;
    html += `<div class="dept"><h2>${DEPT_LABELS[dept]}</h2><div class="grid">`;
    for(const [name, a] of agents){
      const pct = Math.round(100*a.total_tokens/maxTokens);
      html += `<div class="acard ${a.total_dispatches===0?'zero':''}">
        <div class="ahead">
          <div class="aname">${NAME_LABELS[name]||name}</div>
          <div class="badge ${a.status}">${a.status==='running'?'עובד כרגע':'לא פעיל'}</div>
        </div>
        <div class="arow"><span>משימות</span><b>${a.total_dispatches}</b></div>
        <div class="arow"><span>טוקנים</span><b>${fmtNum(a.total_tokens)}</b></div>
        <div class="arow"><span>קריאות כלים</span><b>${a.total_tool_uses}</b></div>
        <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
        ${a.current_task?`<div class="current">🟢 ${a.current_task}</div>`:''}
        <div class="last">פעילות אחרונה: ${fmtAgo(a.last_active)}</div>
        ${a.tasks.length?`<details><summary>${a.tasks.length} משימות</summary>${a.tasks.map(tk=>`<div class="task"><b>${tk.description||'—'}</b><br>${fmtNum(tk.tokens)} tokens · ${tk.tool_uses} tool calls</div>`).join('')}</details>`:''}
      </div>`;
    }
    html += `</div></div>`;
  }
  document.getElementById('depts').innerHTML = html;

  const u = data.unattributed.filter(x => x.description);
  document.getElementById('unattr').textContent = u.length ? `⚠ ${u.length} דיספאצ'ים לא זוהו לסוכן ספציפי (בדיקה ידנית): ${u.map(x=>x.description).join(', ')}` : '';

  buildGraph(data);
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
